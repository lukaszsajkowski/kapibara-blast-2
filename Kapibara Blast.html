<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>KAPIBARA BLAST</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a16;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  user-select: none;
  overflow: hidden;
  touch-action: none;
}
#title {
  color: #ffe14d;
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 10px;
  margin-bottom: 10px;
  text-shadow: 0 0 40px #ffe14d55, 0 3px 0 #aa8800;
}
#hud {
  display: flex;
  gap: 36px;
  margin-bottom: 8px;
  font-size: 0.88rem;
  color: #778;
  letter-spacing: 2px;
}
#hud .val { color: #fff; font-weight: bold; }
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 3px solid #2a2a4a;
  box-shadow: 0 0 80px #ffe14d18, inset 0 0 30px #0006;
  cursor: none;
}
#controls {
  margin-top: 10px;
  font-size: 0.72rem;
  color: #334;
  letter-spacing: 2px;
}
/* Touch controls */
#touch-controls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 180px;
  pointer-events: none;
  z-index: 100;
}
#touch-controls.active { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 20px 20px; }
.touch-btn {
  pointer-events: auto;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.touch-btn:active, .touch-btn.pressed { background: rgba(255,225,77,0.35); border-color: #ffe14d; }
#dpad { position: relative; width: 170px; height: 170px; }
#dpad .touch-btn { position: absolute; }
#dpad .up    { top:0; left:55px; }
#dpad .down  { bottom:0; left:55px; }
#dpad .left  { top:55px; left:0; }
#dpad .right { top:55px; right:0; }
#touch-actions { display:flex; flex-direction:column; gap:12px; align-items:center; }
#touch-actions .touch-btn { width:70px; height:70px; font-size:14px; font-weight:bold; }
#touch-actions .bomb-btn { background: rgba(255,60,60,0.2); border-color: rgba(255,60,60,0.4); }
#touch-actions .bomb-btn:active, #touch-actions .bomb-btn.pressed { background: rgba(255,60,60,0.5); }
#touch-actions .pause-btn { width:44px; height:44px; font-size:18px; background: rgba(255,255,255,0.08); }
/* Name input overlay */
#name-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5,5,15,0.85);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
}
#name-overlay.active { display: flex; }
#name-overlay label {
  color: #ffe14d;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  margin-bottom: 16px;
}
#name-overlay input {
  background: #181830;
  border: 2px solid #ffe14d;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 22px;
  padding: 8px 16px;
  text-align: center;
  width: 260px;
  outline: none;
  letter-spacing: 2px;
}
#name-overlay input::placeholder { color: #556; }
#name-overlay .hint {
  color: #556;
  font-size: 13px;
  margin-top: 12px;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div id="title">KAPIBARA BLAST</div>
<div id="hud">
  <div>POZIOM: <span class="val" id="levelEl">1</span></div>
  <div>ZYCIA: <span class="val" id="livesEl">3</span></div>
  <div>WYNIK: <span class="val" id="scoreEl">0</span></div>
  <div>ROBOTY: <span class="val" id="robotsEl">4</span></div>
  <div>BOMBA: <span class="val" id="bombEl">GOTOWA</span></div>
  <div id="muteEl" style="color:#556">🔊</div>
</div>
<canvas id="c"></canvas>
<div id="name-overlay">
  <label>PODAJ IMIE</label>
  <input type="text" id="name-input" maxlength="16" placeholder="GRACZ" autocomplete="off" />
  <div class="hint">ENTER — ZATWIERDZ</div>
</div>
<div id="controls">WASD / STRZALKI — ruch &nbsp;&nbsp; SPACJA — bomba/detonator &nbsp;&nbsp; ESC — pauza &nbsp;&nbsp; M — mute &nbsp;&nbsp; R — restart</div>

<div id="touch-controls">
  <div id="dpad">
    <div class="touch-btn up" data-dir="up">&#9650;</div>
    <div class="touch-btn down" data-dir="down">&#9660;</div>
    <div class="touch-btn left" data-dir="left">&#9664;</div>
    <div class="touch-btn right" data-dir="right">&#9654;</div>
  </div>
  <div id="touch-actions">
    <div class="touch-btn pause-btn" data-action="pause">&#9208;</div>
    <div class="touch-btn bomb-btn" data-action="bomb">BOMBA</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════════
const TILE = 48;
const COLS = 15;
const ROWS = 13;
const W = COLS * TILE;
const H = ROWS * TILE;

let PLAYER_SPEED = 3.8 * TILE;   // px/sec (mutable — powerup)
const ROBOT_SPEED  = 1.6 * TILE;
const BOMB_FUSE    = 3.0;           // seconds — longer fuse to escape
const EXPL_TIME    = 0.9;
let EXPL_RANGE     = 2;             // mutable — powerup
let MAX_BOMBS      = 1;             // mutable — powerup

const FLOOR = 0, WALL = 1, CRATE = 2;

// Robot types
const RT_BASIC   = 'basic';
const RT_CHASER  = 'chaser';
const RT_SPEEDER = 'speeder';
const RT_TANK    = 'tank';

// Powerup types
const PU_RANGE  = 'range';
const PU_SPEED  = 'speed';
const PU_LIFE   = 'life';
const PU_BOMBS  = 'bombs';
const PU_SHIELD = 'shield';
const PU_GHOST  = 'ghost';
const PU_DETONATOR = 'detonator';
const PU_MEGA   = 'mega';

// New robot types
const RT_GHOST   = 'ghost_robot';
const RT_BOMBER  = 'bomber';
const RT_SPLITTER= 'splitter';
const RT_BOSS    = 'boss';

// Map tile types (extended)
const TELEPORT_A = 3;
const TELEPORT_B = 4;
const ICE        = 5;
const SPIKES     = 6;

// ════════════════════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const $level  = document.getElementById('levelEl');
const $lives  = document.getElementById('livesEl');
const $score  = document.getElementById('scoreEl');
const $robots = document.getElementById('robotsEl');
const $bomb   = document.getElementById('bombEl');
const $mute   = document.getElementById('muteEl');

// ════════════════════════════════════════════════════════════════
//  RESPONSIVE CANVAS
// ════════════════════════════════════════════════════════════════
function resizeCanvas() {
  const maxW = window.innerWidth * 0.95;
  const maxH = window.innerHeight * 0.78;
  const scale = Math.min(maxW / W, maxH / H, 2);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ════════════════════════════════════════════════════════════════
//  LOCAL STORAGE — High Scores & Settings
// ════════════════════════════════════════════════════════════════
const LS_SCORES_KEY = 'kapibara_blast_highscores';
const LS_SETTINGS_KEY = 'kapibara_blast_settings';
const LS_PLAYER_NAME_KEY = 'kapibara_blast_player_name';
const LS_SAVE_KEY = 'kapibara_blast_save';
const SAVE_VERSION = 1;

const $nameOverlay = document.getElementById('name-overlay');
const $nameInput = document.getElementById('name-input');

let pendingScore = null; // { score, level } waiting for name input

function loadPlayerName() {
  try { return localStorage.getItem(LS_PLAYER_NAME_KEY) || ''; } catch(e) { return ''; }
}
function savePlayerName(name) {
  try { localStorage.setItem(LS_PLAYER_NAME_KEY, name); } catch(e) {}
}

function showNameInput(newScore, lvl) {
  pendingScore = { score: newScore, level: lvl };
  $nameInput.value = loadPlayerName();
  $nameOverlay.classList.add('active');
  $nameInput.focus();
  $nameInput.select();
}

function confirmNameInput() {
  if (!pendingScore) return;
  const name = $nameInput.value.trim() || 'GRACZ';
  savePlayerName(name);
  $nameOverlay.classList.remove('active');
  saveHighScore(pendingScore.score, pendingScore.level, name);
  pendingScore = null;
  canvas.focus();
}

$nameInput.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') confirmNameInput();
});

function loadHighScores() {
  try {
    const raw = localStorage.getItem(LS_SCORES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveHighScore(newScore, lvl, name) {
  const scores = loadHighScores();
  scores.push({ score: newScore, level: lvl, name: name || 'GRACZ', date: new Date().toLocaleDateString('pl-PL') });
  scores.sort((a,b) => b.score - a.score);
  if (scores.length > 10) scores.length = 10;
  try { localStorage.setItem(LS_SCORES_KEY, JSON.stringify(scores)); } catch(e) {}
  return scores;
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(LS_SETTINGS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveSettings() {
  try {
    localStorage.setItem(LS_SETTINGS_KEY, JSON.stringify({ muted, musicMuted }));
  } catch(e) {}
}

function hasSavedGame() {
  try {
    return !!localStorage.getItem(LS_SAVE_KEY);
  } catch(e) { return false; }
}

function clearSavedGame() {
  try { localStorage.removeItem(LS_SAVE_KEY); } catch(e) {}
}

function canSaveGameState() {
  return state === 'playing' || state === 'levelintro' || state === 'paused';
}

function buildSaveData() {
  return {
    version: SAVE_VERSION,
    savedAt: new Date().toISOString(),
    game: {
      state,
      map,
      player,
      robots,
      bombs,
      explosions,
      powerups,
      particles,
      floatingTexts,
      robotDebris,
      score,
      lives,
      level,
      levelTimer,
      levelTime,
      deathTimer,
      shake,
      shakeT,
      comboCount,
      comboTimer,
      bombsActive,
      levelScoreStart,
      levelComboMax,
      levelTimeBonus,
      playerShield,
      playerGhost,
      playerDetonator,
      playerMega,
      teleportCooldown,
      spikesTimer,
      playerSlide,
      PLAYER_SPEED,
      EXPL_RANGE,
      MAX_BOMBS,
      detonatorBombIndex: detonatorBomb ? bombs.indexOf(detonatorBomb) : -1,
    }
  };
}

function saveGameState() {
  if (!canSaveGameState()) return;
  try {
    localStorage.setItem(LS_SAVE_KEY, JSON.stringify(buildSaveData()));
  } catch(e) {}
}

function loadGameState() {
  try {
    const raw = localStorage.getItem(LS_SAVE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (!parsed || parsed.version !== SAVE_VERSION || !parsed.game) {
      clearSavedGame();
      return false;
    }

    const g = parsed.game;
    map = Array.isArray(g.map) ? g.map : mkMap();
    player = g.player && typeof g.player.x === 'number' && typeof g.player.y === 'number' ? g.player : mkPlayer();
    robots = Array.isArray(g.robots) ? g.robots : [];
    bombs = Array.isArray(g.bombs) ? g.bombs : [];
    explosions = Array.isArray(g.explosions) ? g.explosions : [];
    powerups = Array.isArray(g.powerups) ? g.powerups : [];
    particles = Array.isArray(g.particles) ? g.particles : [];
    floatingTexts = Array.isArray(g.floatingTexts) ? g.floatingTexts : [];
    robotDebris = Array.isArray(g.robotDebris) ? g.robotDebris : [];

    score = typeof g.score === 'number' ? g.score : 0;
    lives = typeof g.lives === 'number' ? g.lives : 3;
    level = typeof g.level === 'number' ? g.level : 1;
    levelTimer = typeof g.levelTimer === 'number' ? g.levelTimer : 0;
    levelTime = typeof g.levelTime === 'number' ? g.levelTime : 0;
    deathTimer = typeof g.deathTimer === 'number' ? g.deathTimer : 0;
    shake = typeof g.shake === 'number' ? g.shake : 0;
    shakeT = typeof g.shakeT === 'number' ? g.shakeT : 0;
    comboCount = typeof g.comboCount === 'number' ? g.comboCount : 0;
    comboTimer = typeof g.comboTimer === 'number' ? g.comboTimer : 0;
    bombsActive = typeof g.bombsActive === 'number' ? g.bombsActive : bombs.length;
    levelScoreStart = typeof g.levelScoreStart === 'number' ? g.levelScoreStart : score;
    levelComboMax = typeof g.levelComboMax === 'number' ? g.levelComboMax : 0;
    levelTimeBonus = typeof g.levelTimeBonus === 'number' ? g.levelTimeBonus : 0;
    playerShield = !!g.playerShield;
    playerGhost = typeof g.playerGhost === 'number' ? g.playerGhost : 0;
    playerDetonator = !!g.playerDetonator;
    playerMega = !!g.playerMega;
    teleportCooldown = typeof g.teleportCooldown === 'number' ? g.teleportCooldown : 0;
    spikesTimer = typeof g.spikesTimer === 'number' ? g.spikesTimer : 0;
    playerSlide = g.playerSlide && typeof g.playerSlide.dx === 'number' && typeof g.playerSlide.dy === 'number' ? g.playerSlide : null;
    PLAYER_SPEED = typeof g.PLAYER_SPEED === 'number' ? g.PLAYER_SPEED : 3.8 * TILE;
    EXPL_RANGE = typeof g.EXPL_RANGE === 'number' ? g.EXPL_RANGE : 2;
    MAX_BOMBS = typeof g.MAX_BOMBS === 'number' ? g.MAX_BOMBS : 1;
    detonatorBomb = Number.isInteger(g.detonatorBombIndex) && g.detonatorBombIndex >= 0 ? bombs[g.detonatorBombIndex] || null : null;

    keys = {};
    pendingScore = null;
    $nameOverlay.classList.remove('active');
    showingHighScores = false;
    highScoreSaved = false;
    summaryCounters = null;
    state = 'paused';
    stopMusic();
    hud();
    return true;
  } catch(e) {
    clearSavedGame();
    return false;
  }
}

// ════════════════════════════════════════════════════════════════
//  COLOR PALETTE
// ════════════════════════════════════════════════════════════════
const C = {
  floorA:'#141828', floorB:'#111524',
  wall:'#2c3054',   wallHi:'#3d4470', wallSh:'#1a1e38',
  crate:'#6b3e1e',  crateHi:'#8a5228', crateSh:'#4a2910',
  crateX:'#5a3218',

  capyBody:'#b07a38', capyBelly:'#c89855', capySh:'#8a5e28',
  capyHead:'#c0924a', capyEar:'#d4aa70', capyNose:'#d48070',
  capyEye:'#1a0800', capyWhite:'#fff8f0',

  robotBody:'#4a5c6e', robotHi:'#607888', robotSh:'#2e3c48',
  robotHead:'#3a4c5e', robotPanel:'#2a3c4e',
  robotEyeOn:'#ff3a3a', robotEyeOff:'#881a1a',
  robotAnt:'#8aaabb', robotJoint:'#1e2c38',

  bomb:'#0e0e18', bombHi:'#2a2a44', bombFuse:'#7a5520',
  spark:'#ffe14d',

  explosionC:'#ffffff', explosionM:'#ffdd00', explosionO:'#ff6600', explosionE:'#ff220000',
};

// ════════════════════════════════════════════════════════════════
//  AUDIO SYSTEM (Web Audio API — procedural, no files)
// ════════════════════════════════════════════════════════════════
let audioCtx = null;
let muted = false;
let musicMuted = false;
// Apply saved settings
(function() { const s = loadSettings(); if (s.muted !== undefined) { muted = s.muted; musicMuted = s.musicMuted ?? s.muted; } })();
let masterGain = null;
let sfxGain = null;
let musicGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1.0;
  masterGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.5;
  sfxGain.connect(masterGain);
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.25;
  musicGain.connect(masterGain);
}

function ensureAudio() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// --- SFX: Bomb placement (thunk) ---
function sfxBombPlace() {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.12);
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(g); g.connect(sfxGain);
  osc.start(t); osc.stop(t + 0.15);
}

// --- SFX: Explosion (boom) ---
function sfxExplosion(range) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const dur = 0.3 + (range || 2) * 0.05;
  // Noise burst
  const bufSize = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(0.5, t);
  nGain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(800, t);
  filt.frequency.exponentialRampToValueAtTime(100, t + dur);
  noise.connect(filt); filt.connect(nGain); nGain.connect(sfxGain);
  noise.start(t); noise.stop(t + dur);
  // Sub bass thump
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, t);
  osc.frequency.exponentialRampToValueAtTime(20, t + 0.25);
  g.gain.setValueAtTime(0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(g); g.connect(sfxGain);
  osc.start(t); osc.stop(t + 0.3);
}

// --- SFX: Robot death (metallic crunch) ---
function sfxRobotDeath() {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  // Metallic noise
  const bufSize = audioCtx.sampleRate * 0.25;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.setValueAtTime(2000, t);
  filt.Q.value = 5;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  noise.connect(filt); filt.connect(g); g.connect(sfxGain);
  noise.start(t); noise.stop(t + 0.25);
  // Descending tone
  const osc = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
  og.gain.setValueAtTime(0.15, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(og); og.connect(sfxGain);
  osc.start(t); osc.stop(t + 0.2);
}

// --- SFX: Powerup pickup (positive chime) ---
function sfxPowerup() {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const notes = [523, 659, 784]; // C5, E5, G5
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t + i * 0.08);
    g.gain.linearRampToValueAtTime(0.25, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.2);
  });
}

// --- SFX: Player death (dramatic descending) ---
function sfxPlayerDeath() {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.6);
  g.gain.setValueAtTime(0.25, t);
  g.gain.linearRampToValueAtTime(0.3, t + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  osc.connect(g); g.connect(sfxGain);
  osc.start(t); osc.stop(t + 0.7);
  // Noise layer
  const bufSize = audioCtx.sampleRate * 0.5;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
  const ns = audioCtx.createBufferSource();
  ns.buffer = buf;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.2, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  ns.connect(ng); ng.connect(sfxGain);
  ns.start(t); ns.stop(t + 0.5);
}

// --- SFX: Level transition (fanfare) ---
function sfxLevelComplete() {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const notes = [392, 494, 587, 784]; // G4, B4, D5, G5
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t + i * 0.12);
    g.gain.linearRampToValueAtTime(0.18, t + i * 0.12 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.35);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.35);
  });
}

// --- SFX: Footsteps (subtle) ---
let lastStepTime = 0;
function sfxStep() {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  if (t - lastStepTime < 0.18) return;
  lastStepTime = t;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(100 + Math.random() * 40, t);
  osc.frequency.exponentialRampToValueAtTime(50, t + 0.06);
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(g); g.connect(sfxGain);
  osc.start(t); osc.stop(t + 0.06);
}

// ── MUSIC SYSTEM (procedural 8-bit beat) ──────────────────────
let musicPlaying = false;
let musicInterval = null;
let musicStep = 0;

const MUSIC_BASS =  [0, 0, 7, 7, 5, 5, 3, 3]; // semitones from root
const MUSIC_MELODY = [12,12,15,12,17,15,12,10, 12,12,15,12,19,17,15,12];
const MUSIC_ROOT = 110; // A2

function semitoneToFreq(root, semi) {
  return root * Math.pow(2, semi / 12);
}

function musicNoteOn(freq, type, vol, dur) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.setValueAtTime(vol, t + dur * 0.7);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g); g.connect(musicGain);
  osc.start(t); osc.stop(t + dur);
}

function musicTick() {
  if (!audioCtx || musicMuted) return;
  const bpm = musicTempo();
  const beatDur = 60 / bpm;

  // Bass
  const bassNote = MUSIC_BASS[musicStep % MUSIC_BASS.length];
  musicNoteOn(semitoneToFreq(MUSIC_ROOT, bassNote), 'square', 0.2, beatDur * 0.8);

  // Melody (every other step)
  if (musicStep % 2 === 0) {
    const melNote = MUSIC_MELODY[(musicStep / 2) % MUSIC_MELODY.length];
    musicNoteOn(semitoneToFreq(MUSIC_ROOT, melNote), 'square', 0.1, beatDur * 0.6);
  }

  // Hi-hat (noise tick)
  if (musicStep % 2 === 1) {
    const bufSize = audioCtx.sampleRate * 0.04;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const ns = audioCtx.createBufferSource();
    ns.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = 8000;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    ns.connect(filt); filt.connect(g); g.connect(musicGain);
    ns.start(); ns.stop(audioCtx.currentTime + 0.04);
  }

  // Kick drum on beat 0 and 4
  if (musicStep % 4 === 0) {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(g); g.connect(musicGain);
    osc.start(t); osc.stop(t + 0.12);
  }

  musicStep++;
}

function musicTempo() {
  // Normal 140 BPM, 180 when 1 robot left
  if (state === 'playing' && robots && robots.filter(r => r.alive).length === 1) return 180;
  return 140;
}

function startMusic() {
  if (musicPlaying) stopMusic();
  musicPlaying = true;
  musicStep = 0;
  scheduleMusic();
}

function scheduleMusic() {
  if (!musicPlaying) return;
  const bpm = musicTempo();
  const interval = (60 / bpm) * 1000;
  musicInterval = setTimeout(() => {
    if (musicPlaying && !musicMuted) musicTick();
    if (musicPlaying) scheduleMusic();
  }, interval);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearTimeout(musicInterval); musicInterval = null; }
}

function toggleMute() {
  muted = !muted;
  musicMuted = muted;
  if (muted) stopMusic();
  else if (state === 'playing' || state === 'levelintro' || state === 'levelcomplete') startMusic();
}

let map, player, robots, bombs, explosions, powerups, particles, floatingTexts;
let robotDebris = []; // for death animation

let level, levelTimer, levelTime;

let keys = {};
let lastTime = 0;

// Level summary tracking

let levelTimeBonus = 0;      // time bonus awarded

let playerMega = false;      // next bomb has full-range

function mkMap() {
  const m = [];
  for (let y=0; y<ROWS; y++) {
    m[y] = [];
    for (let x=0; x<COLS; x++) {
      const border = x===0||y===0||x===COLS-1||y===ROWS-1;
      const pillar = x%2===0 && y%2===0;
      if (border||pillar) { m[y][x]=WALL; continue; }
      // safe zones at all 4 corners (player start + robot starts)
      const corners = (x<=2&&y<=2)||(x>=COLS-3&&y<=2)||(x<=2&&y>=ROWS-3)||(x>=COLS-3&&y>=ROWS-3);
      const density = typeof mkMap_density === 'function' ? mkMap_density() : 0.62;
      m[y][x] = (!corners && Math.random()<density) ? CRATE : FLOOR;
    }
  }
  return m;
}

function mkPlayer() {
  return { x:TILE, y:TILE, facing:1, frame:0, animT:0, alive:true,
           invince:0, bombCooldown:0, bombPlanted:false };
}

function mkRobot(tx, ty, type=RT_BASIC) {
  const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
  const bossHp = 1 + Math.floor(level / 5) * 2; // 3 at lvl5, 5 at lvl10, 7 at lvl15...
  const hp = type===RT_BOSS ? bossHp : type===RT_TANK ? 2 : type===RT_SPLITTER ? 1 : 1;
  const r = { x:tx*TILE, y:ty*TILE,
           dir:dirs[Math.floor(Math.random()*4)],
           facing:1, frame:0, animT:0, alive:true,
           changeT:0, type, hp, hitFlash:0 };
  if (type===RT_BOMBER) r.bombTimer = 3 + Math.random()*3;
  if (type===RT_BOSS) r.attackTimer = 4 + Math.random()*2;
  if (type===RT_SPLITTER) r.isMini = false;
  return r;
}

function reset() {
  PLAYER_SPEED = 3.8 * TILE;
  EXPL_RANGE = 2;
  MAX_BOMBS = 1;
  bombsActive = 0;

  shake=0; shakeT=0;
  playerShield=false; playerGhost=0; playerDetonator=false; playerMega=false;

function startNewGame() {
