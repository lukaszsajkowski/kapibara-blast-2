function isBossLevel(lvl) { return lvl >= 5 && lvl % 5 === 0; }

function robotsForLevel(lvl) {
  // Boss levels: boss + a few minions scaling with difficulty
  if (isBossLevel(lvl)) {
    const pool = [RT_BOSS];
    const tier = Math.floor(lvl / 5); // 1 at lvl 5, 2 at lvl 10, ...
    // A handful of minions to keep it interesting
    const minions = Math.min(1 + tier, 4);
    for (let i=0; i<minions; i++) pool.push(RT_BASIC);
    if (tier >= 2) pool.push(RT_CHASER);
    if (tier >= 3) pool.push(RT_TANK);
    if (tier >= 4) pool.push(RT_BOMBER);
    return pool;
  }

  const pool = [];
  // Always some basics
  const basics = Math.max(1, 2 + Math.floor(lvl * 0.3));
  for (let i=0; i<basics; i++) pool.push(RT_BASIC);
  // Speeders from level 1
  if (lvl >= 1) { const n = Math.min(1 + Math.floor((lvl-1)*0.4), 3); for (let i=0;i<n;i++) pool.push(RT_SPEEDER); }
  // Chasers from level 2
  if (lvl >= 2) { const n = Math.min(1 + Math.floor((lvl-2)*0.3), 3); for (let i=0;i<n;i++) pool.push(RT_CHASER); }
  // Tanks from level 3
  if (lvl >= 3) { const n = Math.min(1 + Math.floor((lvl-3)*0.3), 2); for (let i=0;i<n;i++) pool.push(RT_TANK); }
  // Ghost robots from level 4
  if (lvl >= 4) { const n = Math.min(1 + Math.floor((lvl-4)*0.3), 2); for (let i=0;i<n;i++) pool.push(RT_GHOST); }
  // Bomber robots from level 5
  if (lvl >= 5) { const n = Math.min(1 + Math.floor((lvl-5)*0.25), 2); for (let i=0;i<n;i++) pool.push(RT_BOMBER); }
  // Splitter robots from level 6
  if (lvl >= 6) { const n = Math.min(1 + Math.floor((lvl-6)*0.2), 2); for (let i=0;i<n;i++) pool.push(RT_SPLITTER); }
  return pool;
}

function spawnPositions(count) {
  // Corners + center + edge mids, avoiding player start (1,1)
  const preferred = [
    [COLS-2, 1], [1, ROWS-2], [COLS-2, ROWS-2],
    [Math.floor(COLS/2), Math.floor(ROWS/2)],
    [Math.floor(COLS/2), 1], [Math.floor(COLS/2), ROWS-2],
    [1, Math.floor(ROWS/2)], [COLS-2, Math.floor(ROWS/2)],
  ];
  // Collect all free floor tiles away from player start
  const free = [];
  for (let y=1;y<ROWS-1;y++) for (let x=1;x<COLS-1;x++) {
    if (map[y][x]===FLOOR && !(x<=2 && y<=2)) free.push([x,y]);
  }
  const used = new Set();
  const result = [];
  for (let i=0; i<count; i++) {
    const pref = preferred[i % preferred.length];
    if (pref && map[pref[1]][pref[0]]===FLOOR && !used.has(`${pref[0]},${pref[1]}`)) {
      result.push(pref);
      used.add(`${pref[0]},${pref[1]}`);
    } else {
      // Find a random free tile not yet used
      for (let tries=0; tries<100; tries++) {
        const candidate = free[Math.floor(Math.random()*free.length)];
        const key = `${candidate[0]},${candidate[1]}`;
        if (!used.has(key)) { result.push(candidate); used.add(key); break; }
      }
    }
  }
  return result;
}

function startLevel() {
  level++;
  map = mkMap();
  placeMapElements();
  player = mkPlayer();
  player.invince = 2.0; // brief invincibility on level start
  bombsActive = 0;
  bombs=[]; explosions=[]; powerups=[]; robotDebris=[];
  detonatorBomb=null; teleportCooldown=0; spikesTimer=0;

  const types = robotsForLevel(level);
  const positions = spawnPositions(types.length);
  robots = types.map((type, i) => {
    const [tx, ty] = positions[i];
    const r = mkRobot(tx, ty, type);
    return r;
  });

  levelTime = 0;
  levelScoreStart = score;
  levelComboMax = 0;
  levelTimeBonus = 0;
  summaryCounters = null;
  state = 'levelintro';
  levelTimer = 2.0;
  hud();
  saveGameState();
}

function placeMapElements() {
  // Collect free floor tiles (not in corners/safe zones)
  const free = [];
  for (let y=1;y<ROWS-1;y++) for (let x=1;x<COLS-1;x++) {
    if (map[y][x]!==FLOOR) continue;
    const corners = (x<=2&&y<=2)||(x>=COLS-3&&y<=2)||(x<=2&&y>=ROWS-3)||(x>=COLS-3&&y>=ROWS-3);
    if (corners) continue;
    free.push([x,y]);
  }
  // Shuffle
  for (let i=free.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [free[i],free[j]]=[free[j],free[i]]; }
  let idx=0;

  // Teleports — pair, from level 3
  if (level >= 3 && free.length >= idx+2) {
    const [ax,ay] = free[idx++];
    const [bx,by] = free[idx++];
    map[ay][ax] = TELEPORT_A;
    map[by][bx] = TELEPORT_B;
  }

  // Ice tiles — cluster from level 4
  if (level >= 4) {
    const iceCount = Math.min(3 + level, 12);
    for (let i=0;i<iceCount && idx<free.length;i++) {
      const [ix,iy] = free[idx++];
      map[iy][ix] = ICE;
    }
  }

  // Spike tiles — from level 5
  if (level >= 5) {
    const spikeCount = Math.min(2 + Math.floor(level*0.5), 8);
    for (let i=0;i<spikeCount && idx<free.length;i++) {
      const [sx,sy] = free[idx++];
      map[sy][sx] = SPIKES;
    }
  }
}

function mkMap_density() {
  // Increase crate density with level (0.62 base, up to 0.75)
  return Math.min(0.62 + level * 0.015, 0.75);
}


function hud() {
  $level.textContent = level;
  $lives.textContent = lives;
  $score.textContent = score;
  $robots.textContent = robots.filter(r=>r.alive).length;
  let bombTxt = `${bombsActive}/${MAX_BOMBS}`;
  if (playerDetonator) bombTxt += ' 🔴';
  if (playerMega) bombTxt += ' 💀';
  $bomb.textContent = bombTxt;
}

// ════════════════════════════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════════════════════════════
function tileOf(px,py){ return [Math.floor(px/TILE), Math.floor(py/TILE)]; }

function hasBomb(tx,ty){ return bombs.some(b=>b.tx===tx&&b.ty===ty); }

function playerOverlapsTile(tx,ty) {
  const pad = TILE*(1-0.7)/2 + 1;
  const s   = TILE - pad*2 - 1;
  const corners = [
    [player.x+pad,   player.y+pad],
    [player.x+pad+s, player.y+pad],
    [player.x+pad,   player.y+pad+s],
    [player.x+pad+s, player.y+pad+s],
  ];
  return corners.some(([cx,cy]) => Math.floor(cx/TILE)===tx && Math.floor(cy/TILE)===ty);
}

function solid(tx,ty,ignoreBombs=false,isGhost=false) {
  if (tx<0||ty<0||tx>=COLS||ty>=ROWS) return true;
  const t = map[ty][tx];
  if (t===WALL) return true;
  if (t===CRATE && !isGhost) return true;
  if (!ignoreBombs && hasBomb(tx,ty)) {
    if (playerOverlapsTile(tx,ty)) return false;
    return true;
  }
  return false;
}

function solidForRobot(tx,ty,robotType) {
  if (tx<0||ty<0||tx>=COLS||ty>=ROWS) return true;
  const t = map[ty][tx];
  if (t===WALL) return true;
  if (t===CRATE && robotType!==RT_GHOST) return true;
  if (hasBomb(tx,ty)) return true;
  return false;
}

// Check if a hitbox rectangle (top-left px,py, size in tile-fractions) is clear
function canGo(px,py, size=0.7, isGhost=false) {
  const pad = TILE*(1-size)/2 + 1;
  const s   = TILE - pad*2 - 1;
  const corners = [
    [px+pad,    py+pad],
    [px+pad+s,  py+pad],
    [px+pad,    py+pad+s],
    [px+pad+s,  py+pad+s],
  ];
  for (const [cx,cy] of corners) {
    const tx=Math.floor(cx/TILE), ty=Math.floor(cy/TILE);
    if (solid(tx,ty,false,isGhost)) return false;
  }
  return true;
}

function canGoRobot(px,py,size,robotType) {
  const pad = TILE*(1-size)/2 + 1;
  const s   = TILE - pad*2 - 1;
  const corners = [
    [px+pad,    py+pad],
    [px+pad+s,  py+pad],
    [px+pad,    py+pad+s],
    [px+pad+s,  py+pad+s],
  ];
  for (const [cx,cy] of corners) {
    const tx=Math.floor(cx/TILE), ty=Math.floor(cy/TILE);
    if (solidForRobot(tx,ty,robotType)) return false;
  }
  return true;
}

// Bomberman-style axis movement with grid snapping
// entity has .x .y (top-left px), moves dx/dy px this frame
// returns new {x,y}
const SNAP_DIST = TILE * 0.36;
function moveEntity(ex, ey, dx, dy, size=0.7, isGhost=false) {
  let nx = ex + dx;
  let ny = ey + dy;

  if (dx !== 0 && dy === 0) {
    const tileCenter = Math.round(ey / TILE) * TILE;
    const offset = ey - tileCenter;
    if (Math.abs(offset) < SNAP_DIST && offset !== 0) {
      const snapStep = Math.sign(-offset) * Math.min(Math.abs(offset), Math.abs(dx));
      if (canGo(ex, ey + snapStep, size, isGhost)) ny = ey + snapStep;
      else ny = ey;
    } else {
      ny = ey;
    }
    if (!canGo(nx, ny, size, isGhost)) { nx = ex; }
  } else if (dy !== 0 && dx === 0) {
    const tileCenter = Math.round(ex / TILE) * TILE;
    const offset = ex - tileCenter;
    if (Math.abs(offset) < SNAP_DIST && offset !== 0) {
      const snapStep = Math.sign(-offset) * Math.min(Math.abs(offset), Math.abs(dy));
      if (canGo(ex + snapStep, ey, size, isGhost)) nx = ex + snapStep;
      else nx = ex;
    } else {
      nx = ex;
    }
    if (!canGo(nx, ny, size, isGhost)) { ny = ey; }
  }

  return { x: nx, y: ny };
}

function moveEntityRobot(ex, ey, dx, dy, size, robotType) {
  let nx = ex + dx;
  let ny = ey + dy;

  if (dx !== 0 && dy === 0) {
    const tileCenter = Math.round(ey / TILE) * TILE;
    const offset = ey - tileCenter;
    if (Math.abs(offset) < SNAP_DIST && offset !== 0) {
      const snapStep = Math.sign(-offset) * Math.min(Math.abs(offset), Math.abs(dx));
      if (canGoRobot(ex, ey + snapStep, size, robotType)) ny = ey + snapStep;
      else ny = ey;
    } else { ny = ey; }
    if (!canGoRobot(nx, ny, size, robotType)) { nx = ex; }
  } else if (dy !== 0 && dx === 0) {
    const tileCenter = Math.round(ex / TILE) * TILE;
    const offset = ex - tileCenter;
    if (Math.abs(offset) < SNAP_DIST && offset !== 0) {
      const snapStep = Math.sign(-offset) * Math.min(Math.abs(offset), Math.abs(dy));
      if (canGoRobot(ex + snapStep, ey, size, robotType)) nx = ex + snapStep;
      else nx = ex;
    } else { nx = ex; }
    if (!canGoRobot(nx, ny, size, robotType)) { ny = ey; }
  }

  return { x: nx, y: ny };
}

// ════════════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════════════
function update(dt) {
  shakeT -= dt;
  if (shakeT<0) shake=0;

  if (state==='menu') {
    // idle — wait for input
  } else if (state==='levelintro') {
    levelTimer -= dt;
    if (levelTimer <= 0) {
      state='playing';
      if (!musicMuted && !musicPlaying) startMusic();
      saveGameState();
    }
  } else if (state==='paused') {
    // frozen
  } else if (state==='playing') {
    levelTime += dt;
    spikesTimer += dt;
    teleportCooldown = Math.max(0, teleportCooldown - dt);
    playerGhost = Math.max(0, playerGhost - dt);
    comboTimer = Math.max(0, comboTimer - dt);
    if (comboTimer <= 0) comboCount = 0;
    updatePlayer(dt);
    updateRobots(dt);
    updateBombs(dt);
    updateExplosions(dt);
    updatePowerups(dt);
    updateParticles(dt);
    updateFloatingTexts(dt);
    updateRobotDebris(dt);
    checkHits();
    checkTeleport();
    checkSpikes();
    checkIce(dt);
    if (robots.every(r=>!r.alive)) {
      // Time bonus
      levelTimeBonus = Math.max(0, Math.floor((120 - levelTime) * 5));
      if (levelTimeBonus > 0) {
        score += levelTimeBonus;
      }
      // Init summary counters for animated count-up
      const levelScore = score - levelScoreStart - levelTimeBonus;
      summaryCounters = {
        scoreTarget: levelScore, scoreCurrent: 0,
        timeBonusTarget: levelTimeBonus, timeBonusCurrent: 0,
        comboMax: levelComboMax,
        totalTarget: score, totalCurrent: score - levelScore - levelTimeBonus,
        phase: 0, phaseTimer: 0, done: false
      };
      state='levelcomplete';
      levelTimer = 0;
      sfxLevelComplete();
    }
  } else if (state==='levelcomplete') {
    updateParticles(dt);
    updateFloatingTexts(dt);
    updateRobotDebris(dt);
    levelTimer += dt;
    // Animate summary counters
    if (summaryCounters && !summaryCounters.done) {
      const sc = summaryCounters;
      sc.phaseTimer += dt;
      const speed = 1.8; // counter speed
      if (sc.phase === 0) {
        sc.scoreCurrent = Math.min(sc.scoreTarget, sc.scoreCurrent + sc.scoreTarget * speed * dt);
        if (sc.scoreCurrent >= sc.scoreTarget) { sc.scoreCurrent = sc.scoreTarget; sc.phase = 1; sc.phaseTimer = 0; }
      } else if (sc.phase === 1) {
        sc.timeBonusCurrent = Math.min(sc.timeBonusTarget, sc.timeBonusCurrent + Math.max(sc.timeBonusTarget, 100) * speed * dt);
        if (sc.timeBonusCurrent >= sc.timeBonusTarget) { sc.timeBonusCurrent = sc.timeBonusTarget; sc.phase = 2; sc.phaseTimer = 0; }
      } else if (sc.phase === 2) {
        sc.totalCurrent = Math.min(sc.totalTarget, sc.totalCurrent + sc.totalTarget * speed * dt);
        if (sc.totalCurrent >= sc.totalTarget) { sc.totalCurrent = sc.totalTarget; sc.phase = 3; sc.phaseTimer = 0; sc.done = true; }
      }
    }
    // Wait for counters to finish + 1.5s, or 6s max, then key press to continue
    if (summaryCounters && summaryCounters.done && levelTimer > 4.5) startLevel();
    if (levelTimer > 8) startLevel();
  } else if (state==='dead') {
    updateParticles(dt);
    updateFloatingTexts(dt);
    updateRobotDebris(dt);
    deathTimer -= dt;
    if (deathTimer<=0) {
      if (lives>0) {
        player=mkPlayer(); player.invince=2.5; state='playing';
        saveGameState();
      }
      else {
        state='gameover'; stopMusic(); clearSavedGame();
      }
    }
  }
}

function updatePlayer(dt) {
  const p = player;
  if (!p.alive) return;
  p.invince = Math.max(0, p.invince-dt);
  p.bombCooldown = Math.max(0, p.bombCooldown-dt);

  const spd = PLAYER_SPEED * dt;
  let moved = false;
  let dx=0, dy=0, face=0;

  if      (keys['ArrowLeft'] ||keys['a']||keys['A']) { dx=-spd; face=-1; }
  else if (keys['ArrowRight']||keys['d']||keys['D']) { dx= spd; face= 1; }
  else if (keys['ArrowUp']   ||keys['w']||keys['W']) { dy=-spd; }
  else if (keys['ArrowDown'] ||keys['s']||keys['S']) { dy= spd; }

  if (dx!==0||dy!==0) {
    const res = moveEntity(p.x, p.y, dx, dy, 0.7, playerGhost>0);
    if (res.x!==p.x||res.y!==p.y) {
      p.x=res.x; p.y=res.y;
      if (face!==0) p.facing=face;
      moved=true;
    }
  }

  if (moved) {
    p.animT+=dt; p.frame=Math.floor(p.animT*9)%2;
    sfxStep();
    // Trail particles when speed boosted
    if (PLAYER_SPEED > 4.2 * TILE && Math.random() < 0.4) {
      particles.push({
        x: p.x + TILE/2 + (Math.random()-0.5)*8,
        y: p.y + TILE*0.7,
        vx: (Math.random()-0.5)*20, vy: -Math.random()*30,
        life: 0.3, maxLife: 0.3,
        color: '#44ddff', size: 2 + Math.random()*2, gravity: -10
      });
    }
  }
  else p.frame=0;

  // Plant bomb / detonate
  if ((keys[' ']||keys['Space']) && p.bombCooldown<=0) {
    // If detonator bomb is placed, detonate it
    if (detonatorBomb && bombs.includes(detonatorBomb)) {
      detonatorBomb.timer = 0; // force immediate explosion
      detonatorBomb = null;
      p.bombCooldown=0.25;
    } else if (bombsActive < MAX_BOMBS) {
      const tx=Math.floor((p.x+TILE/2)/TILE), ty=Math.floor((p.y+TILE/2)/TILE);
      if (!solid(tx,ty,true,playerGhost>0)) {
        const b = {tx,ty,timer:BOMB_FUSE,sparkT:0,isMega:playerMega,isDetonator:playerDetonator};
        if (playerDetonator) { b.timer = 9999; detonatorBomb = b; playerDetonator = false; }
        if (playerMega) { playerMega = false; }
        bombs.push(b);
        bombsActive++;
        p.bombCooldown=0.25;
        sfxBombPlace();
        hud();
        saveGameState();
      }
    }
  }

}

function updateRobots(dt) {
  const toAdd = []; // for splitter spawns
  robots.forEach(r=>{
    if (!r.alive) return;
    r.hitFlash = Math.max(0, (r.hitFlash||0)-dt);
    r.invince = Math.max(0, (r.invince||0)-dt);

    // Speed by type, scales +5% per level
    const levelScale = 1 + (level - 1) * 0.05;
    const baseSpeed = ({
      [RT_BASIC]:   ROBOT_SPEED,
      [RT_CHASER]:  ROBOT_SPEED * 1.15,
      [RT_SPEEDER]: ROBOT_SPEED * 2.2,
      [RT_TANK]:    ROBOT_SPEED * 0.65,
      [RT_GHOST]:   ROBOT_SPEED * 1.0,
      [RT_BOMBER]:  ROBOT_SPEED * 0.9,
      [RT_SPLITTER]:ROBOT_SPEED * (r.isMini ? 1.8 : 1.1),
      [RT_BOSS]:    ROBOT_SPEED * 0.5,
    }[r.type] || ROBOT_SPEED);
    const spd = baseSpeed * levelScale * dt;

    // AI direction
    if (r.type === RT_CHASER || r.type === RT_BOSS) {
      r.changeT -= dt;
      if (r.changeT <= 0) {
        r.changeT = r.type===RT_BOSS ? 0.8+Math.random()*0.5 : 0.45 + Math.random()*0.3;
        const px = Math.round(player.x/TILE), py = Math.round(player.y/TILE);
        const rx = Math.round(r.x/TILE),      ry = Math.round(r.y/TILE);
        const diffX = px-rx, diffY = py-ry;
        const dirs = [];
        if (diffX > 0) dirs.push({dx:1,dy:0});
        else if (diffX < 0) dirs.push({dx:-1,dy:0});
        if (diffY > 0) dirs.push({dx:0,dy:1});
        else if (diffY < 0) dirs.push({dx:0,dy:-1});
        if (!dirs.length) dirs.push(...[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}]);
        const valid = dirs.filter(d=>!solidForRobot(rx+d.dx, ry+d.dy, r.type));
        r.dir = valid.length ? valid[Math.floor(Math.random()*valid.length)]
                             : [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}][Math.floor(Math.random()*4)];
      }
    } else {
      const interval = r.type===RT_SPEEDER ? 0.25+Math.random()*0.4
                     : r.type===RT_SPLITTER && r.isMini ? 0.2+Math.random()*0.3
                     : 0.8+Math.random()*1.5;
      r.changeT -= dt;
      if (r.changeT <= 0) {
        r.changeT = interval;
        const allDirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
        r.dir = allDirs[Math.floor(Math.random()*4)];
      }
    }

    // Bomber: place bombs periodically
    if (r.type === RT_BOMBER) {
      r.bombTimer = (r.bombTimer||0) - dt;
      if (r.bombTimer <= 0) {
        r.bombTimer = 2.5 + Math.random()*3;
        const rtx = Math.round(r.x/TILE), rty = Math.round(r.y/TILE);
        if (!hasBomb(rtx, rty) && map[rty][rtx] !== WALL) {
          bombs.push({tx:rtx, ty:rty, timer:BOMB_FUSE, sparkT:0, isRobot:true});
          bombsActive++;
        }
      }
    }

    // Boss: special attack — scales with tier
    if (r.type === RT_BOSS) {
      r.attackTimer = (r.attackTimer||0) - dt;
      if (r.attackTimer <= 0) {
        const bossTier = Math.floor(level / 5); // 1 at lvl5, 2 at lvl10...
        r.attackTimer = bossTier >= 3 ? 2 + Math.random()*1.5 : 3 + Math.random()*2;
        const rtx = Math.round(r.x/TILE), rty = Math.round(r.y/TILE);
        if (!hasBomb(rtx, rty)) {
          const useMega = bossTier >= 3; // mega bombs from lvl 15+
          bombs.push({tx:rtx, ty:rty, timer:1.5, sparkT:0, isMega:useMega, isRobot:true});
          bombsActive++;
          addShake(4);
          spawnParticles(r.x+TILE/2, r.y+TILE/2, '#ffcc00', 8, 100, 0.4, 4);
        }
      }
    }

    // Movement
    const rdx = r.dir.dx*spd, rdy = r.dir.dy*spd;
    const res = (r.type===RT_GHOST)
      ? moveEntityRobot(r.x, r.y, rdx, rdy, 0.62, RT_GHOST)
      : moveEntity(r.x, r.y, rdx, rdy, r.type===RT_BOSS?0.55:0.62);

    if (res.x!==r.x||res.y!==r.y) {
      r.x=res.x; r.y=res.y;
      if (r.dir.dx!==0) r.facing=r.dir.dx>0?1:-1;
    } else {
      r.changeT=0;
      const allDirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
      const shuffled = allDirs.sort(()=>Math.random()-0.5);
      r.dir = shuffled.find(d=>{
        const tx=Math.round(r.x/TILE)+d.dx, ty=Math.round(r.y/TILE)+d.dy;
        return !solidForRobot(tx,ty,r.type);
      }) || shuffled[0];
    }

    r.animT=(r.animT||0)+dt;
    r.frame=Math.floor(r.animT*7)%2;
  });
  if (toAdd.length) robots.push(...toAdd);
}

function updateBombs(dt) {
  bombs.forEach(b=>{ b.timer-=dt; b.sparkT+=dt; });
  const exploding = bombs.filter(b=>b.timer<=0);
  bombs = bombs.filter(b=>b.timer>0);
  exploding.forEach(explode);
  if (exploding.length) saveGameState();
}

function spawnParticles(px, py, color, count, speed, life, size=3) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = speed*(0.4+Math.random()*0.8);
    particles.push({
      x: px, y: py,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life, maxLife: life,
      color, size: size*(0.5+Math.random()*0.8),
      gravity: 80,
    });
  }
}

function explode(bomb) {
  const {tx,ty}=bomb;
  const range = bomb.isMega ? Math.max(COLS, ROWS) : EXPL_RANGE;
  const cells=[[tx,ty,'center']];
  [[1,0,'h'],[-1,0,'h'],[0,1,'v'],[0,-1,'v']].forEach(([dx,dy,type])=>{
    for (let i=1;i<=range;i++){
      const ex=tx+dx*i, ey=ty+dy*i;
      if (ey<0||ey>=ROWS||ex<0||ex>=COLS) break;
      if (map[ey][ex]===WALL) break;
      cells.push([ex,ey,type]);
      if (map[ey][ex]===CRATE) {
        map[ey][ex]=FLOOR;
        score+=10; hud();
        spawnFloatingText(ex*TILE+TILE/2, ey*TILE, '+10', '#c89855');
        if (Math.random()<0.28) spawnPowerup(ex, ey);
        const cx=ex*TILE+TILE/2, cy=ey*TILE+TILE/2;
        spawnParticles(cx, cy, '#8a5228', 6, 120, 0.6, 4);
        spawnParticles(cx, cy, '#6b3e1e', 4, 80, 0.5, 5);
        if (!bomb.isMega) break; // mega blasts through crates
      }
    }
  });
  cells.forEach(([x,y])=>{
    explosions.push({x,y,timer:EXPL_TIME,isRobot:!!bomb.isRobot});
    const cx=x*TILE+TILE/2, cy=y*TILE+TILE/2;
    spawnParticles(cx, cy, '#ffe14d', 5, 160, 0.45, 4);
    spawnParticles(cx, cy, '#ff6600', 4, 100, 0.35, 5);
    spawnParticles(cx, cy, '#ff2200', 3, 70,  0.3,  6);
  });
  if (bomb === detonatorBomb) detonatorBomb = null;
  if (!bomb.isRobot) bombsActive = Math.max(0, bombsActive-1);
  else bombsActive = Math.max(0, bombsActive-1);
  addShake(bomb.isMega ? 10 : 6);
  sfxExplosion(range);
  hud();
}

function spawnPowerup(tx, ty) {
  const types = [PU_RANGE, PU_SPEED, PU_LIFE, PU_BOMBS];
  // New powerups appear from higher levels
  if (level >= 3) types.push(PU_SHIELD);
  if (level >= 4) types.push(PU_GHOST);
  if (level >= 5) types.push(PU_DETONATOR);
  if (level >= 6) types.push(PU_MEGA);
  const type = types[Math.floor(Math.random()*types.length)];
  powerups.push({ tx, ty, type, animT:0 });
}

function updatePowerups(dt) {
  powerups.forEach(p=>{ p.animT=(p.animT||0)+dt; });
  powerups = powerups.filter(pu=>{
    const px=Math.round(player.x/TILE), py=Math.round(player.y/TILE);
    if (pu.tx===px && pu.ty===py && !isMaxedOut(pu.type)) {
      applyPowerup(pu.type);
      sfxPowerup();
      // pickup sparkle
      spawnParticles(pu.tx*TILE+TILE/2, pu.ty*TILE+TILE/2, '#ffe14d', 12, 140, 0.5, 3);
      spawnParticles(pu.tx*TILE+TILE/2, pu.ty*TILE+TILE/2, '#ffffff', 6, 90, 0.4, 2);
      return false;
    }
    return true;
  });
}

function isMaxedOut(type) {
  if (type===PU_RANGE)  return EXPL_RANGE >= 5;
  if (type===PU_SPEED)  return PLAYER_SPEED >= 6.5*TILE;
  if (type===PU_LIFE)   return lives >= 5;
  if (type===PU_BOMBS)  return MAX_BOMBS >= 4;
  if (type===PU_SHIELD) return playerShield === true;
  if (type===PU_DETONATOR) return playerDetonator === true;
  if (type===PU_MEGA)   return playerMega === true;
  return false;
}

function applyPowerup(type) {
  if (type===PU_RANGE)  { EXPL_RANGE = Math.min(EXPL_RANGE+1, 5); score+=50; }
  if (type===PU_SPEED)  { PLAYER_SPEED = Math.min(PLAYER_SPEED+0.6*TILE, 6.5*TILE); score+=50; }
  if (type===PU_LIFE)   { lives = Math.min(lives+1, 5); score+=50; hud(); }
  if (type===PU_BOMBS)  { MAX_BOMBS = Math.min(MAX_BOMBS+1, 4); score+=50; }
  if (type===PU_SHIELD) { playerShield = true; score+=50; spawnFloatingText(player.x+TILE/2, player.y, 'TARCZA!', '#44ddff'); }
  if (type===PU_GHOST)  { playerGhost = 8; score+=50; spawnFloatingText(player.x+TILE/2, player.y, 'DUCH 8s!', '#bb88ff'); }
  if (type===PU_DETONATOR) { playerDetonator = true; score+=50; spawnFloatingText(player.x+TILE/2, player.y, 'DETONATOR!', '#ff4444'); }
  if (type===PU_MEGA)   { playerMega = true; score+=50; spawnFloatingText(player.x+TILE/2, player.y, 'MEGA BOMBA!', '#ff00ff'); }
  hud();
  saveGameState();
}

function updateParticles(dt) {
  particles.forEach(p=>{
    p.x  += p.vx*dt;
    p.y  += p.vy*dt;
    p.vy += p.gravity*dt;
    p.vx *= 0.92;
    p.life -= dt;
  });
  particles = particles.filter(p=>p.life>0);
}

function updateExplosions(dt) {
  explosions.forEach(e=>e.timer-=dt);
  explosions=explosions.filter(e=>e.timer>0);
}

// ── FLOATING TEXT ──────────────────────────────────────────────
function spawnFloatingText(x, y, text, color='#ffe14d') {
  floatingTexts.push({ x, y, text, color, life: 1.2, maxLife: 1.2 });
}

function updateFloatingTexts(dt) {
  floatingTexts.forEach(f => { f.life -= dt; f.y -= 40 * dt; });
  floatingTexts = floatingTexts.filter(f => f.life > 0);
}

function drawFloatingTexts() {
  floatingTexts.forEach(f => {
    const alpha = Math.min(1, f.life / f.maxLife * 2);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = f.color;
    ctx.font = `bold ${TILE*0.38}px 'Courier New'`;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  });
}

// ── COMBO / SCORE HELPERS ─────────────────────────────────────
function addScore(amount, x, y, label) {
  let multiplier = 1;
  if (comboTimer > 0 && comboCount > 0) {
    multiplier = Math.min(comboCount + 1, 5);
  }
  comboCount++;
  comboTimer = 1.5; // combo window
  if (comboCount > levelComboMax) levelComboMax = comboCount;
  const total = amount * multiplier;
  score += total;
  const txt = multiplier > 1 ? `+${total} x${multiplier}` : `+${total}`;
  spawnFloatingText(x, y, label ? `${label} ${txt}` : txt);
  hud();
}

function checkHits() {
  const p=player;
  if (!p.alive||p.invince>0) return;
  const ptx=Math.round(p.x/TILE), pty=Math.round(p.y/TILE);

  if (explosions.some(e=>e.x===ptx&&e.y===pty)) { killPlayer(); return; }

  robots.forEach(r=>{
    if (!r.alive) return;
    const rtx=Math.round(r.x/TILE), rty=Math.round(r.y/TILE);
    if ((r.invince||0)<=0 && explosions.some(e=>e.x===rtx&&e.y===rty&&!(r.type===RT_BOSS&&e.isRobot))) {
      r.hp--;
      r.invince = 0.8;
      if (r.hp <= 0) {
        r.alive=false;
        const rx=r.x+TILE/2, ry=r.y+TILE/2;
        const pts = {[RT_TANK]:300,[RT_CHASER]:150,[RT_SPEEDER]:200,[RT_GHOST]:250,
                     [RT_BOMBER]:250,[RT_SPLITTER]:150,[RT_BOSS]:500}[r.type] || 100;
        addScore(pts, rx, ry - 10);
        sfxRobotDeath();
        // Splitter: spawn 2 mini versions
        if (r.type === RT_SPLITTER && !r.isMini) {
          for (let si=0;si<2;si++) {
            const mini = mkRobot(Math.round(r.x/TILE), Math.round(r.y/TILE), RT_SPLITTER);
            mini.isMini = true;
            mini.x = r.x + (si===0?-8:8);
            mini.y = r.y;
            mini.invince = 1.0;
            robots.push(mini);
          }
        }
        // Spawn debris pieces (robot death animation)
        spawnRobotDebris(rx, ry, r.type, r.facing);
        const col = robotColor(r.type);
        spawnParticles(rx, ry, col,    10, 180, 0.7, 5);
        spawnParticles(rx, ry, '#fff',  5, 220, 0.4, 3);
        spawnParticles(rx, ry, '#ff4400', 8, 130, 0.6, 4);
        addShake(5);
      } else {
        r.hitFlash = 0.25;
        spawnParticles(r.x+TILE/2, r.y+TILE/2, '#ff8800', 5, 120, 0.3, 3);
      }
      hud();
    }
    if (p.alive&&p.invince<=0) {
      const dx=Math.abs(p.x-r.x), dy=Math.abs(p.y-r.y);
      if (dx<TILE*0.55&&dy<TILE*0.55) killPlayer();
    }
  });
}

function robotColor(type) {
  return { [RT_BASIC]:'#4a5c6e', [RT_CHASER]:'#cc3333',
           [RT_SPEEDER]:'#33bb55', [RT_TANK]:'#7744bb',
           [RT_GHOST]:'#ccccee', [RT_BOMBER]:'#dd8833',
           [RT_SPLITTER]:'#ddcc22', [RT_BOSS]:'#ffcc00' }[type] || '#888';
}

function killPlayer() {
  if (player.invince>0) return;
  // Shield absorbs one hit
  if (playerShield) {
    playerShield = false;
    player.invince = 1.5;
    spawnFloatingText(player.x+TILE/2, player.y, 'TARCZA!', '#44ddff');
    spawnParticles(player.x+TILE/2, player.y+TILE/2, '#44ddff', 15, 180, 0.6, 4);
    sfxPowerup();
    return;
  }
  player.alive=false; lives--;
  keys = {};
  sfxPlayerDeath();
  const px=player.x+TILE/2, py=player.y+TILE/2;
  spawnParticles(px, py, '#ffe14d', 14, 200, 0.9, 5);
  spawnParticles(px, py, '#ff4400', 10, 150, 0.7, 4);
  spawnParticles(px, py, '#ffffff',  6, 180, 0.5, 3);
  state='dead'; deathTimer=1.8;
  bombsActive=0;
  addShake(10);
  hud();
}

function addShake(amount) { shake=amount; shakeT=0.3; }

// ── MAP ELEMENTS: Teleport, Ice, Spikes ──────────────────────
function checkTeleport() {
  if (teleportCooldown > 0) return;
  const p = player;
  if (!p.alive) return;
  const ptx = Math.round(p.x/TILE), pty = Math.round(p.y/TILE);
  const tile = map[pty]&&map[pty][ptx];
  if (tile === TELEPORT_A || tile === TELEPORT_B) {
    const target = tile === TELEPORT_A ? TELEPORT_B : TELEPORT_A;
    // Find the other teleport
    for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) {
      if (map[y][x] === target) {
        p.x = x * TILE; p.y = y * TILE;
        teleportCooldown = 1.0;
        spawnParticles(ptx*TILE+TILE/2, pty*TILE+TILE/2, '#bb44ff', 12, 150, 0.5, 4);
        spawnParticles(x*TILE+TILE/2, y*TILE+TILE/2, '#bb44ff', 12, 150, 0.5, 4);
        sfxPowerup();
        return;
      }
    }
  }
}

function checkSpikes() {
  // Spikes cycle: 2s visible, 2s hidden
  const spikesOn = Math.floor(spikesTimer / 2) % 2 === 0;
  if (!spikesOn) return;
  const p = player;
  if (!p.alive || p.invince > 0) return;
  const ptx = Math.round(p.x/TILE), pty = Math.round(p.y/TILE);
  if (map[pty]&&map[pty][ptx] === SPIKES) {
    killPlayer();
  }
  // Also damage robots on spikes
  robots.forEach(r => {
    if (!r.alive || (r.invince||0) > 0) return;
    const rtx = Math.round(r.x/TILE), rty = Math.round(r.y/TILE);
    if (map[rty]&&map[rty][rtx] === SPIKES) {
      r.hp--;
      r.invince = 1.5;
      r.hitFlash = 0.3;
      if (r.hp <= 0) {
        r.alive = false;
        const rx=r.x+TILE/2, ry=r.y+TILE/2;
        addScore(50, rx, ry-10, 'KOLCE');
        sfxRobotDeath();
        spawnRobotDebris(rx, ry, r.type, r.facing);
        spawnParticles(rx, ry, robotColor(r.type), 8, 150, 0.6, 4);
        addShake(3);
        hud();
      }
    }
  });
}

// Ice sliding — player and robots slide on ice tiles
let playerSlide = null; // {dx, dy} direction of slide
function checkIce(dt) {
  const p = player;
  if (!p.alive) return;
  const ptx = Math.round(p.x/TILE), pty = Math.round(p.y/TILE);
  if (map[pty]&&map[pty][ptx] === ICE && playerSlide) {
    const slideSpeed = PLAYER_SPEED * 1.2 * dt;
    const res = moveEntity(p.x, p.y, playerSlide.dx*slideSpeed, playerSlide.dy*slideSpeed, 0.7, playerGhost>0);
    if (res.x !== p.x || res.y !== p.y) {
      p.x = res.x; p.y = res.y;
    } else {
      playerSlide = null; // hit wall, stop sliding
    }
  } else if (map[pty]&&map[pty][ptx] !== ICE) {
    playerSlide = null;
  }
  // Set slide direction when entering ice
  if (map[pty]&&map[pty][ptx] === ICE && !playerSlide) {
    if (keys['ArrowLeft']||keys['a']||keys['A']) playerSlide = {dx:-1,dy:0};
    else if (keys['ArrowRight']||keys['d']||keys['D']) playerSlide = {dx:1,dy:0};
    else if (keys['ArrowUp']||keys['w']||keys['W']) playerSlide = {dx:0,dy:-1};
    else if (keys['ArrowDown']||keys['s']||keys['S']) playerSlide = {dx:0,dy:1};
  }
}

// ── ROBOT DEBRIS (death animation) ────────────────────────────
function spawnRobotDebris(cx, cy, type, facing) {
  const col = robotColor(type);
  const parts = [
    { label:'head', ox:0, oy:-12, w:14, h:12 },
    { label:'body', ox:0, oy:0,   w:16, h:14 },
    { label:'armL', ox:-14,oy:-2, w:6,  h:10 },
    { label:'armR', ox:14, oy:-2, w:6,  h:10 },
    { label:'legL', ox:-6, oy:12, w:7,  h:8  },
    { label:'legR', ox:6,  oy:12, w:7,  h:8  },
    { label:'ant',  ox:6,  oy:-18,w:3,  h:8  },
  ];
  parts.forEach(p => {
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 120;
    robotDebris.push({
      x: cx + p.ox, y: cy + p.oy,
      w: p.w, h: p.h,
      vx: Math.cos(angle) * speed + (p.ox > 0 ? 30 : p.ox < 0 ? -30 : 0),
      vy: Math.sin(angle) * speed - 80 - Math.random() * 60,
      rot: 0, rotV: (Math.random() - 0.5) * 15,
      life: 1.0, maxLife: 1.0,
      color: col,
      label: p.label,
    });
  });
}

function updateRobotDebris(dt) {
  robotDebris.forEach(d => {
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.vy += 300 * dt; // gravity
    d.rot += d.rotV * dt;
    d.life -= dt;
  });
  robotDebris = robotDebris.filter(d => d.life > 0);
}

function drawRobotDebris() {
  robotDebris.forEach(d => {
    const alpha = Math.max(0, d.life / d.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    // Head piece gets an "eye"
    if (d.label === 'head') {
      ctx.fillStyle = d.color;
      rr(-d.w/2, -d.h/2, d.w, d.h, 3); ctx.fill();
      ctx.fillStyle = '#ff3a3a';
      circle(- 3, -1, 2); ctx.fill();
      circle(3, -1, 2); ctx.fill();
    } else if (d.label === 'ant') {
      ctx.strokeStyle = d.color; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -d.h); ctx.stroke();
      ctx.fillStyle = '#ff3a3a'; circle(0, -d.h, 2); ctx.fill();
    } else {
      ctx.fillStyle = d.color;
      rr(-d.w/2, -d.h/2, d.w, d.h, 2); ctx.fill();
      // Panel detail
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(-d.w/4, -d.h/4, d.w/2, d.h/2);
    }
    ctx.restore();
  });
}

// ════════════════════════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════════════════════════
function rr(x,y,w,h,r=4) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function circle(cx,cy,r) {
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.closePath();
}

// ════════════════════════════════════════════════════════════════
//  DANGER INDICATOR — tiles flash when bomb <1s to explode
// ════════════════════════════════════════════════════════════════
function drawDangerIndicators(t) {
  bombs.forEach(b => {
    if (b.isDetonator && b.timer > 100) return; // detonator bombs don't tick down
    if (b.timer > 1.0) return;
    const flash = Math.sin(t * 20) * 0.5 + 0.5;
    const alpha = (1 - b.timer) * 0.3 * flash;
    const {tx, ty} = b;
    const range = b.isMega ? Math.max(COLS, ROWS) : EXPL_RANGE;
    const cells = [[tx, ty]];
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy]) => {
      for (let i = 1; i <= range; i++) {
        const ex = tx + dx*i, ey = ty + dy*i;
        if (ey<0||ey>=ROWS||ex<0||ex>=COLS) break;
        if (map[ey][ex] === WALL) break;
        cells.push([ex, ey]);
        if (map[ey][ex] === CRATE) break;
      }
    });
    ctx.save();
    ctx.fillStyle = `rgba(255, 60, 20, ${alpha})`;
    cells.forEach(([cx, cy]) => {
      ctx.fillRect(cx * TILE, cy * TILE, TILE, TILE);
    });
    // Border pulse on danger cells
    ctx.strokeStyle = `rgba(255, 100, 30, ${alpha * 1.5})`;
    ctx.lineWidth = 2;
    cells.forEach(([cx, cy]) => {
      ctx.strokeRect(cx * TILE + 1, cy * TILE + 1, TILE - 2, TILE - 2);
    });
    ctx.restore();
  });
}

// ════════════════════════════════════════════════════════════════
//  DYNAMIC SHADOWS — under entities, react to explosions
// ════════════════════════════════════════════════════════════════
function drawDynamicShadow(ex, ey, radius) {
  // Base shadow
  let shadowAlpha = 0.2;
  let shadowColor = '0,0,0';
  // Check for nearby explosions — brighten shadow area
  const nearExpl = explosions.some(e => {
    const dx = (e.x * TILE + TILE/2) - ex;
    const dy = (e.y * TILE + TILE/2) - ey;
    return Math.sqrt(dx*dx + dy*dy) < TILE * 4;
  });
  if (nearExpl) {
    shadowAlpha = 0.08;
    shadowColor = '255,150,50';
  }
  ctx.save();
  ctx.globalAlpha = shadowAlpha;
  ctx.fillStyle = `rgb(${shadowColor})`;
  ctx.beginPath();
  ctx.ellipse(ex, ey + radius * 1.1, radius * 0.9, radius * 0.25, 0, 0, Math.PI*2);
  ctx.fill();
  if (nearExpl) {
    // Extra glow under character from explosion light
    ctx.globalAlpha = 0.15;
    const g = ctx.createRadialGradient(ex, ey + radius * 0.5, 0, ex, ey + radius * 0.5, radius * 1.5);
    g.addColorStop(0, 'rgba(255,180,80,0.4)');
    g.addColorStop(1, 'rgba(255,100,20,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ex, ey + radius * 0.5, radius * 1.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════
//  DRAW WORLD
// ════════════════════════════════════════════════════════════════
function drawMap() {
  const t_now = performance.now()/1000;
  const spikesOn = Math.floor(spikesTimer / 2) % 2 === 0;
  for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) {
    const px=x*TILE, py=y*TILE, t=map[y][x];
    if (t===FLOOR) {
      ctx.fillStyle=(x+y)%2===0?C.floorA:C.floorB;
      ctx.fillRect(px,py,TILE,TILE);
    } else if (t===WALL) {
      drawWall(px,py);
    } else if (t===CRATE) {
      drawCrate(px,py);
    } else if (t===TELEPORT_A || t===TELEPORT_B) {
      drawTeleport(px, py, t_now, t===TELEPORT_A);
    } else if (t===ICE) {
      drawIce(px, py);
    } else if (t===SPIKES) {
      drawSpikes(px, py, spikesOn, t_now);
    }
  }
}

function drawTeleport(px, py, t, isA) {
  // Floor base
  ctx.fillStyle = '#141828';
  ctx.fillRect(px, py, TILE, TILE);
  // Portal swirl
  const cx = px+TILE/2, cy = py+TILE/2;
  const hue = isA ? '#9944ff' : '#ff44aa';
  const hue2 = isA ? '#6622cc' : '#cc2288';
  ctx.save();
  ctx.globalAlpha = 0.4 + Math.sin(t*4)*0.15;
  const g = ctx.createRadialGradient(cx, cy, 2, cx, cy, TILE*0.42);
  g.addColorStop(0, hue);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, TILE*0.42, 0, Math.PI*2); ctx.fill();
  // Spinning ring
  ctx.strokeStyle = hue2;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, TILE*0.3, t*3, t*3+Math.PI*1.4);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, TILE*0.2, -t*4, -t*4+Math.PI*1.2);
  ctx.stroke();
  // Center dot
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.6 + Math.sin(t*6)*0.3;
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
  // Label
  ctx.fillStyle = hue;
  ctx.globalAlpha = 0.7;
  ctx.font = `bold ${TILE*0.22}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText(isA ? 'A' : 'B', cx, cy + TILE*0.4);
  ctx.restore();
}

function drawIce(px, py) {
  // Light blue reflective surface
  ctx.fillStyle = '#1a2a44';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = '#2a4466';
  ctx.fillRect(px+1, py+1, TILE-2, TILE-2);
  // Shine streaks
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#88bbff';
  ctx.fillRect(px+6, py+4, TILE*0.5, 2);
  ctx.fillRect(px+TILE*0.3, py+TILE*0.6, TILE*0.4, 2);
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#aaddff';
  ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
  // Diamond sparkle
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  const cx=px+TILE*0.7, cy=py+TILE*0.3;
  ctx.moveTo(cx, cy-3); ctx.lineTo(cx+2, cy); ctx.lineTo(cx, cy+3); ctx.lineTo(cx-2, cy);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawSpikes(px, py, active, t) {
  // Distinct dark-red tinted floor for spike tiles
  ctx.fillStyle = '#1c1014';
  ctx.fillRect(px, py, TILE, TILE);
  // Subtle danger border always visible
  ctx.save();
  ctx.strokeStyle = 'rgba(180,50,40,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px+1, py+1, TILE-2, TILE-2);
  ctx.restore();
  if (!active) {
    // Retracted — show holes on tinted floor
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#3a1a1a';
    const spots = [[0.25,0.25],[0.75,0.25],[0.5,0.5],[0.25,0.75],[0.75,0.75]];
    spots.forEach(([sx,sy]) => {
      ctx.beginPath(); ctx.arc(px+TILE*sx, py+TILE*sy, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
    return;
  }
  // Active spikes
  ctx.save();
  const flash = Math.sin(t * 10) * 0.1;
  ctx.globalAlpha = 0.8 + flash;
  ctx.fillStyle = '#aa3333';
  const spots = [[0.25,0.25],[0.75,0.25],[0.5,0.5],[0.25,0.75],[0.75,0.75]];
  spots.forEach(([sx,sy]) => {
    const cx=px+TILE*sx, cy=py+TILE*sy;
    ctx.beginPath();
    ctx.moveTo(cx, cy-6); ctx.lineTo(cx+3, cy+3); ctx.lineTo(cx-3, cy+3);
    ctx.closePath(); ctx.fill();
  });
  // Metallic tips
  ctx.fillStyle = '#ddaaaa';
  ctx.globalAlpha = 0.6;
  spots.forEach(([sx,sy]) => {
    ctx.beginPath(); ctx.arc(px+TILE*sx, py+TILE*sy-5, 1.5, 0, Math.PI*2); ctx.fill();
  });
  // Danger border
  ctx.strokeStyle = `rgba(255,60,30,${0.3+flash})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(px+2, py+2, TILE-4, TILE-4);
  ctx.restore();
}

function drawWall(px,py) {
  ctx.fillStyle=C.wall;
  ctx.fillRect(px,py,TILE,TILE);
  // bevel
  ctx.fillStyle=C.wallHi;
  ctx.fillRect(px,py,TILE,3);
  ctx.fillRect(px,py,3,TILE);
  ctx.fillStyle=C.wallSh;
  ctx.fillRect(px,py+TILE-3,TILE,3);
  ctx.fillRect(px+TILE-3,py,3,TILE);
  // inset
  ctx.fillStyle=C.wallSh;
  ctx.fillRect(px+6,py+6,TILE-12,TILE-12);
  ctx.fillStyle=C.wall;
  ctx.fillRect(px+8,py+8,TILE-16,TILE-16);
  // dot
  ctx.fillStyle=C.wallHi;
  ctx.fillRect(px+TILE/2-2,py+TILE/2-2,4,4);
}

function drawCrate(px,py) {
  ctx.fillStyle=C.crate;
  ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
  ctx.fillStyle=C.crateHi;
  ctx.fillRect(px+2,py+2,TILE-4,5);
  ctx.fillRect(px+2,py+2,5,TILE-4);
  ctx.fillStyle=C.crateSh;
  ctx.fillRect(px+2,py+TILE-7,TILE-4,5);
  ctx.fillRect(px+TILE-7,py+2,5,TILE-4);
  // X cross
  ctx.fillStyle=C.crateX;
  ctx.fillRect(px+TILE/2-1.5,py+6,3,TILE-12);
  ctx.fillRect(px+6,py+TILE/2-1.5,TILE-12,3);
}

// ════════════════════════════════════════════════════════════════
//  DRAW BOMBS
// ════════════════════════════════════════════════════════════════
function drawBombs(t) {
  bombs.forEach(b=>{
    const px=b.tx*TILE+TILE/2, py=b.ty*TILE+TILE/2;
    const urgency = b.isDetonator ? 0.3 : 1-b.timer/BOMB_FUSE;
    const pulse = 1 + Math.sin(t*(6+urgency*18))*0.1;
    const r = TILE*(b.isMega?0.4:0.34)*pulse;

    // shadow
    ctx.save(); ctx.globalAlpha=0.3;
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.ellipse(px,py+r*0.7,r*0.8,r*0.28,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // body
    ctx.fillStyle = b.isMega ? '#2a0030' : C.bomb;
    circle(px,py,r); ctx.fill();
    ctx.fillStyle = b.isMega ? '#5a2070' : C.bombHi;
    circle(px-r*0.3,py-r*0.3,r*0.22); ctx.fill();

    // Detonator indicator — blinking red dot
    if (b.isDetonator) {
      ctx.save();
      ctx.fillStyle = Math.floor(t*4)%2===0 ? '#ff2222' : '#aa0000';
      ctx.globalAlpha = 0.9;
      circle(px, py-r*0.5, 4); ctx.fill();
      ctx.restore();
    }
    // Mega bomb glow
    if (b.isMega) {
      ctx.save();
      ctx.globalAlpha = 0.2 + Math.sin(t*6)*0.1;
      const mg = ctx.createRadialGradient(px,py,r*0.5,px,py,r*2);
      mg.addColorStop(0,'#ff00ff');
      mg.addColorStop(1,'transparent');
      ctx.fillStyle = mg;
      ctx.beginPath(); ctx.arc(px,py,r*2,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // fuse rope
    ctx.strokeStyle=C.bombFuse; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(px+r*0.5,py-r*0.65);
    ctx.quadraticCurveTo(px+r*1.1,py-r*1.0,px+r*0.7,py-r*1.4);
    ctx.stroke();

    // spark at tip
    const sx=px+r*0.7, sy=py-r*1.4;
    if (Math.floor(t*12)%2===0 || urgency>0.7) {
      ctx.fillStyle=C.spark;
      for (let i=0;i<6;i++){
        const a=i/6*Math.PI*2, sr=i%2?6:2.5;
        ctx.beginPath();
        ctx.arc(sx+Math.cos(a)*sr,sy+Math.sin(a)*sr,i%2?2:1,0,Math.PI*2);
        ctx.fill();
      }
      ctx.save(); ctx.globalAlpha=0.5;
      ctx.fillStyle=C.spark;
      circle(sx,sy,7); ctx.fill();
      ctx.restore();
    }
  });
}

// ════════════════════════════════════════════════════════════════
//  DRAW EXPLOSIONS
// ════════════════════════════════════════════════════════════════
function drawExplosions() {
  explosions.forEach(e=>{
    const px=e.x*TILE, py=e.y*TILE;
    const life=e.timer/EXPL_TIME; // 1→0
    ctx.save();
    // Gradient fill
    const grad=ctx.createRadialGradient(px+TILE/2,py+TILE/2,2,px+TILE/2,py+TILE/2,TILE*0.75);
    grad.addColorStop(0, `rgba(255,255,220,${life})`);
    grad.addColorStop(0.35,`rgba(255,200,0,${life*0.9})`);
    grad.addColorStop(0.7, `rgba(255,80,0,${life*0.7})`);
    grad.addColorStop(1,   `rgba(255,40,0,0)`);
    ctx.fillStyle=grad;
    ctx.fillRect(px,py,TILE,TILE);
    ctx.restore();
  });
}

// ════════════════════════════════════════════════════════════════
//  DRAW CAPYBARA
// ════════════════════════════════════════════════════════════════
function drawCapybara(cx,cy,facing,frame,alpha=1,t=0) {
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(cx,cy);

  // Idle breathing animation when standing still
  const idle = frame === 0;
  const breathe = idle ? Math.sin(t * 2.5) * 0.015 : 0;
  const breatheY = idle ? Math.sin(t * 2.5) * 1.2 : 0;
  ctx.scale(facing * (1 + breathe), 1 + breathe * 0.5);
  ctx.translate(0, breatheY);

  const bob  = frame===1 ? 2 : 0;
  const S    = TILE*0.86;
  const moving = frame!==0;

  // Cape physics: two control points wave independently
  const w1 = Math.sin(t*10 + 0.0) * (moving?9:4);
  const w2 = Math.sin(t*10 + 0.8) * (moving?6:2.5);
  const w3 = Math.sin(t*10 + 1.6) * (moving?11:5);

  // ── CAPE ─────────────────────────────────────────────────────
  // Full wide cape: attaches at shoulders, fans out behind & down
  const capGrad = ctx.createLinearGradient(0,-S*0.28+bob, -S*0.7+w3, S*0.55+bob);
  capGrad.addColorStop(0, '#1033aa');
  capGrad.addColorStop(0.4,'#2255e0');
  capGrad.addColorStop(1,  '#0d2280');
  ctx.fillStyle = capGrad;

  // Main cape shape — wide silhouette
  ctx.beginPath();
  ctx.moveTo(-S*0.12, -S*0.28+bob);          // left shoulder attach
  ctx.bezierCurveTo(
    -S*0.35+w1*0.3, S*0.0+bob,
    -S*0.6+w1,      S*0.28+bob+w2*0.4,
    -S*0.65+w3,     S*0.55+bob              // bottom-left tip
  );
  ctx.bezierCurveTo(
    -S*0.3+w2,      S*0.62+bob,
    S*0.0+w1*0.2,   S*0.58+bob,
    S*0.08,         S*0.52+bob              // bottom-right tip
  );
  ctx.bezierCurveTo(
    S*0.1,          S*0.3+bob,
    S*0.06,         S*0.0+bob,
    S*0.04,         -S*0.26+bob             // right shoulder attach
  );
  ctx.closePath();
  ctx.fill();

  // Cape highlight fold lines
  ctx.save();
  ctx.strokeStyle = '#4477ff';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.globalAlpha *= 0.55;
  // fold 1
  ctx.beginPath();
  ctx.moveTo(-S*0.06, -S*0.2+bob);
  ctx.bezierCurveTo(-S*0.22+w1*0.3, S*0.1+bob, -S*0.4+w1*0.7, S*0.32+bob, -S*0.44+w3*0.7, S*0.5+bob);
  ctx.stroke();
  // fold 2
  ctx.beginPath();
  ctx.moveTo(S*0.02, -S*0.18+bob);
  ctx.bezierCurveTo(-S*0.05+w1*0.1, S*0.12+bob, -S*0.15+w2*0.4, S*0.36+bob, -S*0.1+w2*0.6, S*0.54+bob);
  ctx.stroke();
  ctx.restore();

  // Cape bottom edge shimmer
  ctx.save();
  ctx.strokeStyle='#6699ff'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.globalAlpha*=0.4;
  ctx.beginPath();
  ctx.moveTo(-S*0.65+w3, S*0.55+bob);
  ctx.bezierCurveTo(-S*0.3+w2, S*0.62+bob, S*0.0+w1*0.2, S*0.58+bob, S*0.08, S*0.52+bob);
  ctx.stroke();
  ctx.restore();

  // ── SHADOW ───────────────────────────────────────────────────
  ctx.save(); ctx.globalAlpha=0.18;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(0, S*0.44+bob, S*0.38, S*0.1, 0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── BOOTS (legs — 2 big bipedal legs, animated) ──────────────
  const lLegBob = frame===0 ?  5 : -3;
  const rLegBob = frame===0 ? -3 :  5;
  // boots
  ctx.fillStyle='#1a2e6a';
  rr(-S*0.22, S*0.28+bob+lLegBob, S*0.22, S*0.22, 4); ctx.fill();
  rr( S*0.02, S*0.28+bob+rLegBob, S*0.22, S*0.22, 4); ctx.fill();
  // boot toe
  ctx.fillStyle='#253888';
  rr(-S*0.26, S*0.42+bob+lLegBob, S*0.3, S*0.1, 3); ctx.fill();
  rr(-S*0.02, S*0.42+bob+rLegBob, S*0.3, S*0.1, 3); ctx.fill();
  // boot highlight
  ctx.fillStyle='#3355bb'; ctx.globalAlpha*=0.5;
  ctx.fillRect(-S*0.22+2, S*0.3+bob+lLegBob, S*0.18, 2);
  ctx.fillRect( S*0.02+2, S*0.3+bob+rLegBob, S*0.18, 2);
  ctx.globalAlpha/=0.5;

  // ── BODY / SUIT ───────────────────────────────────────────────
  // Main suit torso (dark blue)
  const suitGrad = ctx.createLinearGradient(-S*0.28, -S*0.1+bob, S*0.28, S*0.32+bob);
  suitGrad.addColorStop(0,'#1e3faa');
  suitGrad.addColorStop(1,'#0d2070');
  ctx.fillStyle = suitGrad;
  ctx.beginPath();
  ctx.ellipse(0, S*0.1+bob, S*0.3, S*0.27, 0, 0, Math.PI*2);
  ctx.fill();

  // Suit chest emblem — lightning bolt ⚡
  ctx.fillStyle='#ffe14d';
  ctx.beginPath();
  ctx.moveTo(S*0.04, -S*0.05+bob);
  ctx.lineTo(-S*0.03, S*0.06+bob);
  ctx.lineTo(S*0.01, S*0.06+bob);
  ctx.lineTo(-S*0.04, S*0.18+bob);
  ctx.lineTo(S*0.06, S*0.05+bob);
  ctx.lineTo(S*0.01, S*0.05+bob);
  ctx.closePath();
  ctx.fill();

  // Arms / gloves
  ctx.fillStyle='#1a3a99';
  rr(-S*0.38, -S*0.1+bob, S*0.13, S*0.26, 4); ctx.fill();
  rr( S*0.25, -S*0.1+bob, S*0.13, S*0.26, 4); ctx.fill();
  ctx.fillStyle='#112268';
  rr(-S*0.4,  S*0.12+bob, S*0.16, S*0.12, 4); ctx.fill();
  rr( S*0.24, S*0.12+bob, S*0.16, S*0.12, 4); ctx.fill();

  // ── NECK ─────────────────────────────────────────────────────
  ctx.fillStyle=C.capyBody;
  ctx.fillRect(-S*0.08, -S*0.28+bob, S*0.16, S*0.12);

  // ── HEAD ─────────────────────────────────────────────────────
  // Big round capybara head
  ctx.fillStyle=C.capyHead;
  ctx.beginPath();
  ctx.ellipse(0, -S*0.38+bob, S*0.26, S*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // Ears (round, on top)
  ctx.fillStyle=C.capyEar;
  circle(-S*0.18, -S*0.55+bob, S*0.09); ctx.fill();
  circle( S*0.18, -S*0.55+bob, S*0.09); ctx.fill();
  ctx.fillStyle='#d4a880';
  circle(-S*0.18, -S*0.55+bob, S*0.05); ctx.fill();
  circle( S*0.18, -S*0.55+bob, S*0.05); ctx.fill();

  // ── SUPERHERO MASK ────────────────────────────────────────────
  ctx.fillStyle='#1033aa';
  // mask band across eyes
  ctx.beginPath();
  ctx.ellipse(0, -S*0.4+bob, S*0.24, S*0.09, 0, 0, Math.PI*2);
  ctx.fill();
  // mask side wings
  ctx.beginPath();
  ctx.moveTo(-S*0.22, -S*0.38+bob);
  ctx.bezierCurveTo(-S*0.3,-S*0.38+bob,-S*0.32,-S*0.46+bob,-S*0.24,-S*0.48+bob);
  ctx.bezierCurveTo(-S*0.18,-S*0.46+bob,-S*0.16,-S*0.42+bob,-S*0.12,-S*0.4+bob);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo( S*0.22, -S*0.38+bob);
  ctx.bezierCurveTo( S*0.3,-S*0.38+bob, S*0.32,-S*0.46+bob, S*0.24,-S*0.48+bob);
  ctx.bezierCurveTo( S*0.18,-S*0.46+bob, S*0.16,-S*0.42+bob, S*0.12,-S*0.4+bob);
  ctx.fill();

  // Eyes behind mask (white + pupil)
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.ellipse(-S*0.1, -S*0.41+bob, S*0.065, S*0.05, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse( S*0.1, -S*0.41+bob, S*0.065, S*0.05, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0a0a';
  circle(-S*0.08, -S*0.41+bob, S*0.03); ctx.fill();
  circle( S*0.12, -S*0.41+bob, S*0.03); ctx.fill();
  // eye shine
  ctx.fillStyle='#fff';
  circle(-S*0.07, -S*0.43+bob, S*0.012); ctx.fill();
  circle( S*0.13, -S*0.43+bob, S*0.012); ctx.fill();

  // ── SNOUT ─────────────────────────────────────────────────────
  ctx.fillStyle=C.capyHead;
  ctx.beginPath();
  ctx.ellipse(0, -S*0.27+bob, S*0.18, S*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  // big capybara nose pad
  ctx.fillStyle='#c06060';
  rr(-S*0.1, -S*0.3+bob, S*0.2, S*0.1, 4); ctx.fill();
  ctx.fillStyle='#993333';
  circle(-S*0.04, -S*0.26+bob, S*0.03); ctx.fill();
  circle( S*0.04, -S*0.26+bob, S*0.03); ctx.fill();
  // mouth line
  ctx.strokeStyle='#7a3030'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-S*0.05, -S*0.2+bob);
  ctx.lineTo( S*0.05, -S*0.2+bob);
  ctx.stroke();

  // ── COLLAR ────────────────────────────────────────────────────
  ctx.fillStyle='#ffe14d';
  rr(-S*0.14,-S*0.25+bob, S*0.28, S*0.07, 3); ctx.fill();
  ctx.fillStyle='#cc9900';
  ctx.fillRect(-S*0.12,-S*0.24+bob, S*0.24, 2);

  ctx.restore();
}

// ════════════════════════════════════════════════════════════════
//  DRAW POWERUPS
// ════════════════════════════════════════════════════════════════
const PU_COLORS = {
  [PU_RANGE]: '#ff6644', [PU_SPEED]: '#44ddff',
  [PU_LIFE]:  '#ff4488', [PU_BOMBS]: '#ffe14d',
  [PU_SHIELD]:'#44ddff', [PU_GHOST]: '#bb88ff',
  [PU_DETONATOR]:'#ff4444', [PU_MEGA]: '#ff00ff',
};
const PU_ICONS = {
  [PU_RANGE]: '💥', [PU_SPEED]: '⚡',
  [PU_LIFE]:  '❤️', [PU_BOMBS]: '💣',
  [PU_SHIELD]:'🛡', [PU_GHOST]: '👻',
  [PU_DETONATOR]:'🔴', [PU_MEGA]: '💀',
};
const PU_LABELS = {
  [PU_RANGE]: 'ZASIĘG', [PU_SPEED]: 'SZYBKOŚĆ',
  [PU_LIFE]:  'ŻYCIE',  [PU_BOMBS]: 'BOMBA',
  [PU_SHIELD]:'TARCZA', [PU_GHOST]: 'DUCH',
  [PU_DETONATOR]:'DETONATOR', [PU_MEGA]: 'MEGA',
};

function drawPowerups(t) {
  powerups.forEach(pu=>{
    const px=pu.tx*TILE, py=pu.ty*TILE;
    const cx=px+TILE/2, cy=py+TILE/2;
    const bob=Math.sin(t*4+pu.tx)*3;
    const pulse=1+Math.sin(t*5)*0.06;
    const col=PU_COLORS[pu.type];

    // glow
    ctx.save();
    ctx.globalAlpha=0.25+Math.sin(t*4)*0.12;
    const g=ctx.createRadialGradient(cx,cy+bob,2,cx,cy+bob,TILE*0.52);
    g.addColorStop(0,col); g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy+bob,TILE*0.52,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // gem body
    ctx.save();
    ctx.translate(cx, cy+bob);
    ctx.scale(pulse,pulse);
    const r=TILE*0.3;
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(0,-r); ctx.lineTo(r*0.6,-r*0.1);
    ctx.lineTo(r*0.4,r*0.8); ctx.lineTo(-r*0.4,r*0.8);
    ctx.lineTo(-r*0.6,-r*0.1); ctx.closePath();
    ctx.fill();
    // gem shine
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(-r*0.15,-r*0.8); ctx.lineTo(r*0.35,-r*0.05);
    ctx.lineTo(-r*0.1,-r*0.05); ctx.closePath();
    ctx.fill();
    // label
    ctx.fillStyle='#fff';
    ctx.font=`bold ${TILE*0.2}px Courier New`;
    ctx.textAlign='center';
    ctx.fillText(PU_LABELS[pu.type], 0, r*1.3);
    ctx.restore();
  });
}

// ════════════════════════════════════════════════════════════════
//  DRAW PARTICLES
// ════════════════════════════════════════════════════════════════
function drawParticles() {
  particles.forEach(p=>{
    const life = p.life/p.maxLife;
    ctx.save();
    ctx.globalAlpha = life * 0.9;
    ctx.fillStyle = p.color;
    const s = p.size * life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, s), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ════════════════════════════════════════════════════════════════
//  DRAW ROBOT (type-colored)
// ════════════════════════════════════════════════════════════════
function drawRobot(cx,cy,facing,frame,t,type,hitFlash,hp) {
  type = type||RT_BASIC; hitFlash=hitFlash||0; hp=hp==null?1:hp;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(facing,1);

  const typeColors = {
    [RT_BASIC]:   {body:'#4a5c6e',hi:'#607888',sh:'#2e3c48',head:'#3a4c5e',eye:'#ff3a3a'},
    [RT_CHASER]:  {body:'#6e2a2a',hi:'#8a3a3a',sh:'#4a1818',head:'#5a2020',eye:'#ff5500'},
    [RT_SPEEDER]: {body:'#1e5a38',hi:'#2a7a4a',sh:'#103a22',head:'#184830',eye:'#00ff88'},
    [RT_TANK]:    {body:'#4a3060',hi:'#6a4888',sh:'#2e1a40',head:'#3a2050',eye:'#cc44ff'},
    [RT_GHOST]:   {body:'#8888aa',hi:'#aaaacc',sh:'#555577',head:'#9999bb',eye:'#ffffff'},
    [RT_BOMBER]:  {body:'#8a5520',hi:'#bb7733',sh:'#5a3510',head:'#774418',eye:'#ff8800'},
    [RT_SPLITTER]:{body:'#8a8a20',hi:'#bbbb33',sh:'#5a5a10',head:'#777718',eye:'#ffff00'},
    [RT_BOSS]:    {body:'#8a7020',hi:'#ccaa33',sh:'#5a4810',head:'#776018',eye:'#ffcc00'},
  };
  const tc = typeColors[type]||typeColors[RT_BASIC];
  const isMini = hp !== undefined && type === RT_SPLITTER && (hitFlash === 0 || hitFlash > 0) && arguments[9];
  const scale = type===RT_BOSS?1.5:type===RT_TANK?1.18:type===RT_SPEEDER?0.88:1;
  ctx.scale(scale,scale);
  // Ghost robot: semi-transparent
  if (type===RT_GHOST) ctx.globalAlpha *= (0.5 + Math.sin(t*3)*0.15);

  const S=TILE*0.78, bob=frame===1?2:0;
  const eyeOn=Math.floor(t*3)%2===0;

  if (hitFlash>0) {
    ctx.save(); ctx.globalAlpha=hitFlash*3; ctx.fillStyle='#fff';
    ctx.fillRect(-S*0.5,-S*0.65,S*1.0,S*1.3); ctx.restore();
  }

  if (type===RT_TANK && hp>1) {
    ctx.fillStyle='#ff4444'; ctx.fillRect(-S*0.4,-S*0.82,S*0.8,5);
    ctx.fillStyle='#44ff88'; ctx.fillRect(-S*0.4,-S*0.82,S*0.8*(hp/2),5);
  }

  ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,S*0.48+bob,S*0.35,S*0.1,0,0,Math.PI*2);
  ctx.fill(); ctx.restore();

  ctx.fillStyle=tc.sh;
  [[-S*0.16,S*0.25,frame===0?4:-4],[S*0.16,S*0.25,frame===1?4:-4]].forEach(([lx,ly,lb])=>{
    rr(lx-S*0.1,ly+lb+bob,S*0.2,S*0.22,3); ctx.fill();
  });
  [[-S*0.19,S*0.44,frame===0?4:-4],[S*0.13,S*0.44,frame===1?4:-4]].forEach(([lx,ly,lb])=>{
    rr(lx,ly+lb+bob,S*0.26,S*0.1,3); ctx.fill();
  });

  ctx.fillStyle=tc.body; rr(-S*0.28,-S*0.12,S*0.56,S*0.4,5); ctx.fill();
  ctx.fillStyle=tc.hi;   ctx.fillRect(-S*0.28,-S*0.12,S*0.56,4);
  ctx.fillStyle=tc.sh;   ctx.fillRect(-S*0.28,S*0.24,S*0.56,4);

  ctx.fillStyle='#0a1a28'; rr(-S*0.17,S*0.02,S*0.34,S*0.2,3); ctx.fill();
  const led=type===RT_SPEEDER?'#00ff88':type===RT_CHASER?'#ff5500':type===RT_TANK?'#cc44ff':'#1aff88';
  ctx.fillStyle=led;
  for(let i=0;i<3;i++){ctx.globalAlpha=Math.sin(t*(type===RT_SPEEDER?6:2)+i*1.5)*0.5+0.5;circle(-S*0.1+i*S*0.1,S*0.12,S*0.025);ctx.fill();}
  ctx.globalAlpha=1;

  ctx.fillStyle=tc.sh;
  rr(-S*0.42,-S*0.08,S*0.16,S*0.3,3); ctx.fill();
  rr(S*0.26,-S*0.08,S*0.16,S*0.3,3); ctx.fill();
  ctx.fillStyle='#1e2c38';
  rr(-S*0.44,S*0.2,S*0.08,S*0.1,2); ctx.fill(); rr(-S*0.36,S*0.22,S*0.08,S*0.1,2); ctx.fill();
  rr(S*0.28,S*0.2,S*0.08,S*0.1,2);  ctx.fill(); rr(S*0.36,S*0.22,S*0.08,S*0.1,2);  ctx.fill();

  ctx.fillStyle='#1e2c38'; ctx.fillRect(-S*0.08,-S*0.16,S*0.16,S*0.08);

  ctx.fillStyle=tc.head; rr(-S*0.26,-S*0.46,S*0.52,S*0.34,6); ctx.fill();
  ctx.fillStyle=tc.hi;   ctx.fillRect(-S*0.26,-S*0.46,S*0.52,3);
  ctx.fillStyle='#0a1a28'; ctx.fillRect(-S*0.22,-S*0.4,S*0.44,S*0.22);

  ctx.fillStyle=eyeOn?tc.eye:'#441111';
  circle(-S*0.11,-S*0.3,S*0.07); ctx.fill(); circle(S*0.11,-S*0.3,S*0.07); ctx.fill();
  if(eyeOn){ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle=tc.eye;circle(-S*0.11,-S*0.3,S*0.12);ctx.fill();circle(S*0.11,-S*0.3,S*0.12);ctx.fill();ctx.restore();}
  ctx.fillStyle='#fff'; ctx.globalAlpha=0.6;
  circle(-S*0.13,-S*0.32,S*0.025); ctx.fill(); circle(S*0.09,-S*0.32,S*0.025); ctx.fill();
  ctx.globalAlpha=1;

  // HP bar for boss and tank
  if (type===RT_BOSS) {
    const maxHp = 5;
    ctx.fillStyle='#ff4444'; ctx.fillRect(-S*0.4,-S*0.82,S*0.8,5);
    ctx.fillStyle='#44ff88'; ctx.fillRect(-S*0.4,-S*0.82,S*0.8*(hp/maxHp),5);
  }

  const badge={[RT_CHASER]:'⚡',[RT_SPEEDER]:'▶',[RT_TANK]:'🛡',[RT_GHOST]:'👻',[RT_BOMBER]:'💣',[RT_SPLITTER]:'✂',[RT_BOSS]:'👑'}[type];
  if(badge){ctx.font=`${S*0.28}px serif`;ctx.textAlign='center';ctx.fillText(badge,0,-S*0.52+bob);}

  ctx.strokeStyle=tc.hi; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(S*0.08,-S*0.46); ctx.lineTo(S*0.18,-S*0.66); ctx.stroke();
  ctx.fillStyle=eyeOn?tc.eye:'#441111'; circle(S*0.18,-S*0.68,S*0.045); ctx.fill();

  ctx.fillStyle='#0a1a28'; rr(-S*0.18,-S*0.17,S*0.36,S*0.06,2); ctx.fill();
  ctx.fillStyle=tc.hi; ctx.globalAlpha=0.4;
  for(let i=0;i<5;i++) ctx.fillRect(-S*0.15+i*S*0.075,-S*0.17,2,S*0.06);
  ctx.globalAlpha=1;

  ctx.restore();
}

// ════════════════════════════════════════════════════════════════
//  MAIN DRAW
// ════════════════════════════════════════════════════════════════
function draw(t) {
  ctx.save();
  if (shake>0) {
    const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
    ctx.translate(sx,sy);
  }

  ctx.fillStyle='#08080f';
  ctx.fillRect(0,0,W,H);

  drawMap();
  drawDangerIndicators(t);
  drawPowerups(t);
  drawExplosions();
  drawBombs(t);

  // Dynamic shadows under entities
  robots.forEach(r => {
    if (r.alive) drawDynamicShadow(r.x + TILE/2, r.y + TILE/2, TILE * 0.35);
  });
  if (player.alive) drawDynamicShadow(player.x + TILE/2, player.y + TILE/2, TILE * 0.38);

  // Robots
  robots.forEach(r=>{
    if (!r.alive) return;
    if (r.isMini) {
      ctx.save();
      const cx = r.x+TILE/2, cy = r.y+TILE/2;
      ctx.translate(cx, cy);
      ctx.scale(0.6, 0.6);
      ctx.translate(-cx, -cy);
      drawRobot(cx, cy, r.facing, r.frame, t, r.type, r.hitFlash, r.hp);
      ctx.restore();
    } else {
      drawRobot(r.x+TILE/2, r.y+TILE/2, r.facing, r.frame, t, r.type, r.hitFlash, r.hp);
    }
  });

  // Robot debris (death animation)
  drawRobotDebris();

  // Particles
  drawParticles();

  // Player — idle animation (breathing) when not moving
  const p=player;
  if (p.alive) {
    const blink = p.invince>0 && Math.floor(t*9)%2===0;
    if (!blink) {
      ctx.save();
      // Ghost mode: semi-transparent
      if (playerGhost > 0) ctx.globalAlpha = 0.5 + Math.sin(t*5)*0.15;
      const idleFrame = p.frame === 0 ? 0 : p.frame;
      drawCapybara(p.x+TILE/2, p.y+TILE/2, p.facing, idleFrame, 1, t);
      ctx.restore();
      // Shield bubble
      if (playerShield) {
        ctx.save();
        ctx.globalAlpha = 0.25 + Math.sin(t*4)*0.1;
        ctx.strokeStyle = '#44ddff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x+TILE/2, p.y+TILE/2, TILE*0.5, 0, Math.PI*2);
        ctx.stroke();
        const sg = ctx.createRadialGradient(p.x+TILE/2,p.y+TILE/2,TILE*0.1,p.x+TILE/2,p.y+TILE/2,TILE*0.5);
        sg.addColorStop(0,'rgba(68,221,255,0.05)');
        sg.addColorStop(1,'rgba(68,221,255,0.15)');
        ctx.fillStyle = sg;
        ctx.fill();
        ctx.restore();
      }
      // Ghost timer indicator
      if (playerGhost > 0) {
        ctx.save();
        ctx.fillStyle = '#bb88ff';
        ctx.font = `bold ${TILE*0.22}px Courier New`;
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.8;
        ctx.fillText(`👻 ${playerGhost.toFixed(1)}s`, p.x+TILE/2, p.y - 4);
        ctx.restore();
      }
    }
  }

  // Floating score texts
  drawFloatingTexts();

  ctx.restore();

  // Overlay screens
  if (state==='menu')          drawMenuScreen(t);
  if (state==='levelintro')    drawLevelIntro();
  if (state==='levelcomplete') drawLevelComplete();
  if (state==='paused')        drawPauseScreen();
  if (state==='gameover')      drawGameScreen('KONIEC GRY','#ff3030');
}

function drawGameScreen(text, color) {
  // Save high score on game over (once) — show name input
  if (!highScoreSaved) {
    highScoreSaved = true;
    showNameInput(score, level);
  }

  ctx.fillStyle='rgba(5,5,15,0.78)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.fillStyle=color;
  ctx.font=`900 62px 'Courier New'`;
  ctx.fillText(text, W/2, H/2-80);

  ctx.fillStyle='#ccc';
  ctx.font=`22px 'Courier New'`;
  ctx.fillText(`WYNIK: ${score}  —  POZIOM: ${level}`, W/2, H/2-30);

  // Show top 5 high scores
  const scores = loadHighScores();
  if (scores.length > 0) {
    ctx.fillStyle='#ffe14d';
    ctx.font=`bold 16px 'Courier New'`;
    ctx.fillText('NAJLEPSZE WYNIKI', W/2, H/2 + 10);
    ctx.font=`14px 'Courier New'`;
    const top5 = scores.slice(0, 5);
    top5.forEach((s, i) => {
      const isCurrentScore = (s.score === score && i === 0);
      ctx.fillStyle = isCurrentScore ? '#44ff88' : '#889';
      const name = s.name || 'GRACZ';
      ctx.fillText(`${i+1}. ${name}  ${s.score} pkt  —  poz. ${s.level}  —  ${s.date}`, W/2, H/2 + 34 + i * 20);
    });
  }

  ctx.fillStyle='#556';
  ctx.font=`15px 'Courier New'`;
  ctx.fillText('NACISNIJ  R  ABY  ZAGRAC  PONOWNIE', W/2, H/2 + 150);
}

function drawMenuScreen(t) {
  ctx.fillStyle='#0a0a16';
  ctx.fillRect(0,0,W,H);

  // Stars background
  ctx.fillStyle='#ffffff';
  for (let i=0; i<40; i++) {
    const sx = ((i*137+53)%W);
    const sy = ((i*97+29)%H);
    const twinkle = Math.sin(t*2 + i)*0.5+0.5;
    ctx.globalAlpha = twinkle * 0.6;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  if (showingHighScores) {
    // High scores screen
    ctx.textAlign='center';
    ctx.fillStyle='#ffe14d';
    ctx.font=`900 36px 'Courier New'`;
    ctx.fillText('NAJLEPSZE WYNIKI', W/2, 80);

    const scores = loadHighScores();
    if (scores.length === 0) {
      ctx.fillStyle='#556';
      ctx.font=`16px 'Courier New'`;
      ctx.fillText('BRAK WYNIKOW', W/2, H/2);
    } else {
      ctx.font=`15px 'Courier New'`;
      scores.forEach((s, i) => {
        ctx.fillStyle = i < 3 ? '#ffe14d' : '#889';
        const medal = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `${i+1}.`;
        const name = s.name || 'GRACZ';
        ctx.fillText(`${medal}  ${name}  ${s.score} pkt  —  poz. ${s.level}  —  ${s.date}`, W/2, 130 + i * 32);
      });
    }

    ctx.fillStyle='#556';
    ctx.font=`14px 'Courier New'`;
    ctx.fillText('NACISNIJ  ESC  ABY  WROCIC', W/2, H - 40);
    return;
  }

  // Title
  ctx.textAlign='center';
  ctx.fillStyle='#ffe14d';
  ctx.font=`900 56px 'Courier New'`;
  ctx.shadowColor='#ffe14d55';
  ctx.shadowBlur=30;
  ctx.fillText('KAPIBARA', W/2, H/2 - 100);
  ctx.fillText('BLAST', W/2, H/2 - 50);
  ctx.shadowBlur=0;

  // Animated capybara
  const frame = Math.floor(t*2)%2;
  drawCapybara(W/2, H/2 + 30, 1, frame, 1, t);

  // Prompt
  const blink = Math.floor(t*2)%2===0;
  const saveExists = hasSavedGame();
  if (blink) {
    ctx.fillStyle='#aab';
    ctx.font=`18px 'Courier New'`;
    ctx.fillText(saveExists ? 'ENTER — KONTYNUUJ' : 'NACISNIJ  ENTER  ABY  GRAC', W/2, H/2 + 100);
  }

  ctx.fillStyle='#667';
  ctx.font=`15px 'Courier New'`;
  ctx.fillText(saveExists ? 'N — NOWA GRA    H — NAJLEPSZE WYNIKI' : 'H — NAJLEPSZE WYNIKI', W/2, H/2 + 130);

  // Controls hint
  ctx.fillStyle='#445';
  ctx.font=`13px 'Courier New'`;
  ctx.fillText('WASD / STRZALKI — ruch    SPACJA — bomba    ESC — pauza    M — mute', W/2, H/2 + 160);
}

function drawLevelIntro() {
  ctx.fillStyle='rgba(5,5,15,0.85)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.fillStyle='#ffe14d';
  ctx.font=`900 52px 'Courier New'`;
  ctx.fillText(`POZIOM ${level}`, W/2, H/2 - 10);

  if (isBossLevel(level)) {
    ctx.fillStyle='#ff4444';
    ctx.font=`900 32px 'Courier New'`;
    ctx.fillText('⚠ WALKA Z BOSSEM! ⚠', W/2, H/2 + 40);
  } else {
    const robotCount = robots.length;
    ctx.fillStyle='#889';
    ctx.font=`18px 'Courier New'`;
    ctx.fillText(`ROBOTY: ${robotCount}`, W/2, H/2 + 35);
  }
}

function drawLevelComplete() {
  ctx.fillStyle='rgba(5,5,15,0.82)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.fillStyle='#44ff88';
  ctx.font=`900 38px 'Courier New'`;
  ctx.fillText(`POZIOM ${level} UKONCZONY!`, W/2, H/2 - 100);

  if (summaryCounters) {
    const sc = summaryCounters;
    const baseY = H/2 - 45;
    const lineH = 34;

    // Score this level
    ctx.fillStyle='#ccc';
    ctx.font=`18px 'Courier New'`;
    ctx.textAlign='left';
    const lx = W/2 - 140, rx = W/2 + 140;

    ctx.fillText('WYNIK ZA POZIOM:', lx, baseY);
    ctx.textAlign='right';
    ctx.fillStyle='#ffe14d';
    ctx.fillText(Math.floor(sc.scoreCurrent).toString(), rx, baseY);

    // Time bonus
    ctx.textAlign='left';
    ctx.fillStyle = sc.phase >= 1 ? '#ccc' : '#555';
    ctx.fillText('BONUS CZASOWY:', lx, baseY + lineH);
    ctx.textAlign='right';
    ctx.fillStyle = sc.phase >= 1 ? '#44ddff' : '#555';
    ctx.fillText(`+${Math.floor(sc.timeBonusCurrent)}`, rx, baseY + lineH);

    // Max combo
    ctx.textAlign='left';
    ctx.fillStyle = sc.phase >= 1 ? '#ccc' : '#555';
    ctx.fillText('NAJLEPSZE COMBO:', lx, baseY + lineH * 2);
    ctx.textAlign='right';
    ctx.fillStyle = sc.phase >= 1 ? '#ff8844' : '#555';
    ctx.fillText(`x${sc.comboMax}`, rx, baseY + lineH * 2);

    // Divider
    if (sc.phase >= 2) {
      ctx.strokeStyle='#445';
      ctx.beginPath();
      ctx.moveTo(lx, baseY + lineH * 2.7);
      ctx.lineTo(rx, baseY + lineH * 2.7);
      ctx.stroke();
    }

    // Total
    ctx.textAlign='left';
    ctx.fillStyle = sc.phase >= 2 ? '#fff' : '#555';
    ctx.font=`bold 20px 'Courier New'`;
    ctx.fillText('SUMA:', lx, baseY + lineH * 3.4);
    ctx.textAlign='right';
    ctx.fillStyle = sc.phase >= 2 ? '#ffe14d' : '#555';
    ctx.fillText(Math.floor(sc.totalCurrent).toString(), rx, baseY + lineH * 3.4);

    // Continue prompt
    if (sc.done) {
      ctx.textAlign='center';
      ctx.fillStyle='#556';
      ctx.font=`14px 'Courier New'`;
      ctx.fillText('NACISNIJ DOWOLNY KLAWISZ...', W/2, baseY + lineH * 4.6);
    }
  }
}

function drawPauseScreen() {
  ctx.fillStyle='rgba(5,5,15,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.fillStyle='#ffe14d';
  ctx.font=`900 52px 'Courier New'`;
  ctx.fillText('PAUZA', W/2, H/2 - 20);

  ctx.fillStyle='#889';
  ctx.font=`16px 'Courier New'`;
  ctx.fillText('ESC — KONTYNUUJ    R — RESTART    M — MUTE', W/2, H/2 + 30);
}

// ════════════════════════════════════════════════════════════════
//  LOOP
// ════════════════════════════════════════════════════════════════
function loop(ts) {
  const dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  update(dt);
  draw(ts/1000);
  // hud refresh handled in update
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════════════════
window.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();

  // Mute toggle works in any state
  if (e.key==='m'||e.key==='M') {
    ensureAudio();
    toggleMute();
    $mute.textContent = muted ? '🔇' : '🔊';
    saveSettings();
    return;
  }

  if (state==='menu') {
    if (showingHighScores) {
      if (e.key==='Escape'||e.key==='Backspace') showingHighScores = false;
      return;
    }
    if (e.key==='Enter') {
      ensureAudio();
      if (!loadGameState()) startNewGame();
    }
    if (e.key==='n'||e.key==='N') { ensureAudio(); startNewGame(); }
    if (e.key==='h'||e.key==='H') showingHighScores = true;
    return;
  }
  if (state==='paused') {
    if (e.key==='Escape'||e.key==='p'||e.key==='P') { state='playing'; saveGameState(); }
    else if (e.key==='r'||e.key==='R') startNewGame();
    return;
  }
  if (state==='gameover') {
    if (e.key==='r'||e.key==='R') {
      if (pendingScore) confirmNameInput();
      $nameOverlay.classList.remove('active');
      highScoreSaved=false; state='menu';
    }
    return;
  }
  if (state==='levelcomplete') {
    if (summaryCounters && summaryCounters.done) startLevel();
    return;
  }
  if (state==='playing') {
    if (e.key==='Escape'||e.key==='p'||e.key==='P') { state='paused'; saveGameState(); return; }
  }
  if (e.key==='r'||e.key==='R') startNewGame();
});
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

// ════════════════════════════════════════════════════════════════
//  START
// ════════════════════════════════════════════════════════════════
// Start at menu
state = 'menu';
map = mkMap(); player = mkPlayer(); robots=[]; bombs=[]; explosions=[]; powerups=[]; particles=[]; floatingTexts=[]; robotDebris=[];
score=0; lives=3; level=1; levelTime=0; comboCount=0; comboTimer=0;
shake=0; shakeT=0; bombsActive=0; playerSlide=null;
highScoreSaved=false;
// Apply saved mute state to UI
$mute.textContent = muted ? '🔇' : '🔊';
hud();

// ════════════════════════════════════════════════════════════════
//  TOUCH CONTROLS
// ════════════════════════════════════════════════════════════════
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const touchEl = document.getElementById('touch-controls');
if (isTouchDevice) {
  touchEl.classList.add('active');
  document.getElementById('controls').style.display = 'none';
}

// D-pad touch handling
const dirKeyMap = { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight' };
document.querySelectorAll('#dpad .touch-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  const key = dirKeyMap[dir];

  function press(e) {
    e.preventDefault();
    ensureAudio();
    keys[key] = true;
    btn.classList.add('pressed');
    if (state==='menu' && !showingHighScores) {
      if (!loadGameState()) startNewGame();
    }
  }
  function release(e) {
    e.preventDefault();
    keys[key] = false;
    btn.classList.remove('pressed');
  }
  btn.addEventListener('touchstart', press, {passive:false});
  btn.addEventListener('touchend', release, {passive:false});
  btn.addEventListener('touchcancel', release, {passive:false});
});

// Action buttons
document.querySelectorAll('#touch-actions .touch-btn').forEach(btn => {
  const action = btn.dataset.action;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    ensureAudio();
    btn.classList.add('pressed');
    if (action === 'bomb') {
      keys[' '] = true;
      if (state==='menu' && !showingHighScores) {
        if (!loadGameState()) startNewGame();
      }
      if (state==='gameover') { if(pendingScore)confirmNameInput(); $nameOverlay.classList.remove('active'); highScoreSaved=false; state='menu'; }
      if (state==='levelcomplete' && summaryCounters && summaryCounters.done) startLevel();
    } else if (action === 'pause') {
      if (state==='playing') { state='paused'; saveGameState(); }
      else if (state==='paused') { state='playing'; saveGameState(); }
    }
  }, {passive:false});
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    btn.classList.remove('pressed');
    if (action === 'bomb') keys[' '] = false;
  }, {passive:false});
  btn.addEventListener('touchcancel', e => {
    e.preventDefault();
    btn.classList.remove('pressed');
    if (action === 'bomb') keys[' '] = false;
  }, {passive:false});
});

// Prevent default touch behavior on canvas
canvas.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

// Prevent mouse clicks from disrupting gameplay
document.addEventListener('mousedown', e => { if (state === 'playing' || state === 'paused' || state === 'levelintro' || state === 'levelcomplete') e.preventDefault(); });
document.addEventListener('contextmenu', e => { if (state !== 'menu') e.preventDefault(); });

requestAnimationFrame(loop);
</script>
</body>
